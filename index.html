function Home({ data, sectionCounts, onSelectSection, editMode, onSaveHome, totalItems, totalFavs, onOpenItem }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(data.homeContent);

  function startEdit() {
    setDraft(data.homeContent);
    setEditing(true);
  }
  function cancelEdit() { setEditing(false); }
  async function saveEdit() {
    await onSaveHome(draft);
    setEditing(false);
  }

  function setField(k, v) { setDraft(prev => ({ ...prev, [k]: v })); }

  // 빈 값이면 기본 문구로 대체 (저장 데이터가 비어 있어도 히어로가 비지 않게)
  const home = useMemo(() => {
    const base = Store.defaultHome();
    const src = editing ? draft : (data.homeContent || {});
    const out = { ...base };
    Object.keys(base).forEach(k => { if (src[k] != null && String(src[k]).trim() !== '') out[k] = src[k]; });
    out.meta = String(out.meta || '').replace(/SBS/gi, 'AIX');
    if (editing) return { ...out, ...draft };
    return out;
  }, [editing, draft, data.homeContent]);

  // Render title with em-emphasis
  function renderTitle() {
    const { titleLine1, titleLine2, titleEm } = home;
    // If titleEm matches part of titleLine2, italic-amber that part
    if (titleEm && titleLine2 && titleLine2.includes(titleEm)) {
      const idx = titleLine2.indexOf(titleEm);
      const before = titleLine2.slice(0, idx);
      const after = titleLine2.slice(idx + titleEm.length);
      return (
        <>
          {titleLine1}<br/>
          {before}<em>{titleEm}</em>{after}
        </>
      );
    }
    return <>{titleLine1}<br/>{titleLine2}</>;
  }

  return (
    <div className="home">
      <div className="home-orbit"></div>
      <div className="home-inner">

        <div className="home-topbar">
          <span>{home.meta}</span>
          <div className="right">
            <span>2026 · Seoul</span>
            {editMode && !editing && (
              <button
                onClick={startEdit}
                style={{background:'transparent',border:'1px solid var(--line-strong)',color:'var(--ink)',padding:'5px 12px',fontSize:'10px',letterSpacing:'.2em',textTransform:'uppercase',cursor:'pointer',fontWeight:500}}
              >메인 수정</button>
            )}
          </div>
        </div>

        {/* HERO */}
        <div className="home-hero">
          {editing ? (
            <>
              <input
                className="home-tagline-edit"
                style={{fontSize:'11px',letterSpacing:'.35em',textTransform:'uppercase',color:'var(--amber)',marginBottom:'20px'}}
                value={draft.eyebrow}
                onChange={(e)=>setField('eyebrow',e.target.value)}
                placeholder="EYEBROW"
              />
              <input
                className="home-title-edit"
                style={{fontSize:'40px',marginBottom:'8px'}}
                value={draft.titleLine1}
                onChange={(e)=>setField('titleLine1',e.target.value)}
                placeholder="제목 1행"
              />
              <input
                className="home-title-edit"
                style={{fontSize:'40px',marginBottom:'8px'}}
                value={draft.titleLine2}
                onChange={(e)=>setField('titleLine2',e.target.value)}
                placeholder="제목 2행"
              />
              <input
                className="home-tagline-edit"
                style={{fontSize:'12px',marginBottom:'16px',color:'var(--amber-soft)'}}
                value={draft.titleEm}
                onChange={(e)=>setField('titleEm',e.target.value)}
                placeholder="제목 2행 중 강조할 부분 (앰버 색상)"
              />
              <textarea
                className="home-tagline-edit"
                style={{fontSize:'14px',minHeight:'70px'}}
                value={draft.tagline}
                onChange={(e)=>setField('tagline',e.target.value)}
                placeholder="설명 문구"
              />
              <div className="home-edit-actions">
                <button className="home-edit-btn" onClick={saveEdit}>저장</button>
                <button className="home-edit-btn ghost" onClick={cancelEdit}>취소</button>
              </div>
            </>
          ) : (
            <>
              <div className="home-eyebrow">{home.eyebrow}</div>
              <h1 className="home-title">{renderTitle()}</h1>
              <p className="home-tagline">{home.tagline}</p>
            </>
          )}
        </div>

        {/* FEATURED — 다크 카테고리 카드 */}
        <div className="cat-grid">
          {SECTIONS.filter(s => !s.special).map((s, i) => {
            const count = sectionCounts[s.key] || 0;
            const secItems = ((data.sectionData[s.key] || {}).items || []);
            const thumbItem = [...secItems]
              .sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0))
              .find(it => pickThumb(it));
            const thumb = thumbItem ? pickThumb(thumbItem) : null;
            const subCnt = ((data.sectionData[s.key] || {}).subCategories || []).length;
            return (
              <div key={s.key} className="cat-card" onClick={()=>onSelectSection(s.key)}>
                <div className="cat-thumb">
                  {thumb
                    ? <img src={thumb} alt="" loading="lazy" onError={(e)=>{e.target.style.display='none';}} />
                    : <span className="cat-thumb-num">{String(i+1).padStart(2,'0')}</span>}
                </div>
                <div className="cat-label">Category {String(i+1).padStart(2,'0')}</div>
                <div className="cat-row">
                  <div className="cat-name">{s.name}</div>
                  <div className="cat-badge"><span>자료</span><b>{count}</b></div>
                </div>
                <div className="cat-foot">
                  <span>{s.sub}</span>
                  <span>{subCnt > 0 ? `${subCnt} 분류` : '—'}</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* DIRECTORY — 즐겨찾기 / 최근 자료 테이블 */}
        {(() => {
          const withSection = [];
          SECTIONS.forEach(s => {
            if (s.special) return;
            const sec = data.sectionData[s.key] || {};
            (sec.items || []).forEach(it => {
              const sub = (sec.subCategories || []).find(x => String(x.id) === String(it.subId));
              withSection.push({ ...it, _section: s.key, _sectionName: s.name, _subName: sub ? sub.name : '' });
            });
          });
          const favIds = data.favorites || [];
          const favItems = withSection.filter(it => favIds.includes(it.id));
          const isPinned = favItems.length > 0;
          const rows = (isPinned
            ? favItems
            : [...withSection].sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0))
          ).slice(0, 8);
          if (rows.length === 0) return null;
          return (
            <div className="dir-wrap">
              <div className="dir-head">
                <span className="dh name">Name</span>
                <span className="dh">Category</span>
                <span className="dh">Board</span>
                <span className="dh">Date</span>
                <span className="dh"></span>
              </div>
              {rows.map(it => {
                const t = pickThumb(it);
                const title = it.title || it.linkTitle || '제목 없음';
                return (
                  <div key={it.id} className="dir-row" onClick={()=>onOpenItem(it)}>
                    <span className="dc name">
                      <span className="dir-ava">
                        {t
                          ? <img src={t} alt="" loading="lazy" onError={(e)=>{e.target.style.display='none';}} />
                          : title.slice(0,1)}
                      </span>
                      <b>{title}</b>
                      {isPinned && <i className="dir-pro">★</i>}
                    </span>
                    <span className="dc">{it._sectionName}</span>
                    <span className="dc">{it._subName || '—'}</span>
                    <span className="dc">{fmtDate(it.updatedAt || it.createdAt)}</span>
                    <span className="dc view"><button onClick={(e)=>{e.stopPropagation(); onOpenItem(it);}}>View</button></span>
                  </div>
                );
              })}
              <div className="dir-foot">
                {isPinned
                  ? <>자주 보여주는 자료 <b>{favItems.length}건</b>이 고정되어 있습니다</>
                  : <>총 <b>{totalItems}건</b>의 자료가 등록되어 있습니다</>}
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}


/* ============ Main App ============ */
function App() {
  const [data, setData] = useState(null);
  const [activeSection, setActiveSection] = useState('home');
  const [activeSub, setActiveSub] = useState('all');
  const [activeSubSub, setActiveSubSub] = useState('all');
  const [search, setSearch] = useState('');
  const [detailItem, setDetailItem] = useState(null);
  const [previewItem, setPreviewItem] = useState(null);
  const [mediaPreview, setMediaPreview] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [user, setUser] = useState(fbAuth.currentUser);
  const [collapsedSections, setCollapsedSections] = useState({});
  // Tracks the _docUpdatedAt our local data is based on. Updated on load and
  // after every successful save. Used for optimistic concurrency check.
  const docUpdatedAtRef = useRef(0);
  // Always-fresh reference to current data (avoids stale closure bugs).
  const dataRef = useRef(null);
  // Save queue: serializes saves so concurrent calls don't race.
  const saveQueueRef = useRef(Promise.resolve());

  // Keep dataRef in sync with state
  useEffect(() => { dataRef.current = data; }, [data]);

  // Auth listener
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(u => setUser(u));
    return unsub;
  }, []);

  // Load data
  useEffect(() => {
    Store.load().then(d => {
      docUpdatedAtRef.current = d._docUpdatedAt || 0;
      dataRef.current = d;
      setData(d);
    }).catch(e => {
      alert('데이터 로드 실패: ' + (e.message || e));
      const empty = Store.defaultData();
      dataRef.current = empty;
      setData(empty);
    });
  }, []);

  // Mutate data using a producer function. The producer receives the latest
  // data (deep clone) and must return the next state. The whole operation is
  // serialized via saveQueueRef so concurrent calls run in order.
  // - On conflict: alert user, refresh from server, DO NOT apply local changes
  // - On other error: revert and alert
  // - On success: update docUpdatedAt and state
  const mutate = useCallback(async (producer) => {
    const run = async () => {
      const current = dataRef.current;
      if (!current) return;
      const draft = JSON.parse(JSON.stringify(current));
      // Strip the meta field before producer; we'll re-attach _docUpdatedAt at save time
      delete draft._docUpdatedAt;
      const next = producer(draft);
      if (!next) return; // producer can cancel by returning null
      const baseUpdatedAt = docUpdatedAtRef.current;
      // Optimistic update
      dataRef.current = next;
      setData(next);
      try {
        const newUpdatedAt = await Store.save(next, baseUpdatedAt);
        docUpdatedAtRef.current = newUpdatedAt;
      } catch (e) {
        if (e.code === 'conflict') {
          // Pull fresh
          try {
            const fresh = await Store.load();
            docUpdatedAtRef.current = fresh._docUpdatedAt || 0;
            dataRef.current = fresh;
            setData(fresh);
          } catch (e2) {
            // If reload fails, revert to prior
            dataRef.current = current;
            setData(current);
          }
          alert(
            '⚠️ 다른 사람이 동시에 저장한 변경 사항이 있습니다.\n\n' +
            '방금 입력하신 내용은 저장되지 않았습니다.\n' +
            '최신 데이터로 새로고침했으니, 내용을 다시 작성해 주세요.'
          );
        } else {
          // Generic error — revert
          dataRef.current = current;
          setData(current);
        }
      }
    };
    // Chain after any pending save to serialize
    const next = saveQueueRef.current.then(run, run);
    saveQueueRef.current = next;
    return next;
  }, []);

  // Backward-compat: persist receives a fully-built next state. Convert to mutate-style.
  const persist = useCallback(async (next) => {
    return mutate(() => next);
  }, [mutate]);

  // Derived: current section data + filtered items
  const currentSection = useMemo(() => getSectionMeta(activeSection), [activeSection]);
  const isFavView = activeSection === 'favorites';

  const allItems = useMemo(() => {
    if (!data) return [];
    if (isFavView) {
      const favIds = data.favorites || [];
      const all = [];
      Object.keys(data.sectionData).forEach(sk => {
        (data.sectionData[sk].items || []).forEach(it => {
          if (favIds.includes(it.id)) all.push({ ...it, _section: sk });
        });
      });
      return all;
    }
    const sec = data.sectionData[activeSection];
    if (!sec) return [];
    return (sec.items || []).map(it => ({ ...it, _section: activeSection }));
  }, [data, activeSection, isFavView]);

  const subCategories = useMemo(() => {
    if (!data || isFavView) return [];
    const sec = data.sectionData[activeSection];
    return sec ? (sec.subCategories || []) : [];
  }, [data, activeSection, isFavView]);

  const activeSubObj = useMemo(() => {
    if (activeSub === 'all') return null;
    return subCategories.find(s => String(s.id) === String(activeSub));
  }, [subCategories, activeSub]);

  const subSubCategories = useMemo(() => {
    if (!activeSubObj) return [];
    return activeSubObj.subSubCategories || [];
  }, [activeSubObj]);

  const filteredItems = useMemo(() => {
    let items = allItems;
    if (!isFavView && activeSub !== 'all') {
      items = items.filter(it => String(it.subId) === String(activeSub));
      if (activeSubSub !== 'all') {
        items = items.filter(it => String(it.subSubId || '') === String(activeSubSub));
      }
    }
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      items = items.filter(it => {
        const body = (it.body || '').replace(/<[^>]*>/g, ' ');
        const haystack = [it.title, it.desc, it.author, it.speaker, it.specialty, it.career, it.location, it.source, body]
          .filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    return items;
  }, [allItems, activeSub, activeSubSub, search, isFavView]);

  const sectionCounts = useMemo(() => {
    const counts = {};
    if (!data) return counts;
    SECTIONS.forEach(s => {
      if (s.special) {
        counts[s.key] = (data.favorites || []).length;
      } else {
        counts[s.key] = ((data.sectionData[s.key] || {}).items || []).length;
      }
    });
    return counts;
  }, [data]);

  const totalItems = useMemo(() => {
    if (!data) return 0;
    return SECTIONS.filter(s => !s.special).reduce((acc, s) => {
      return acc + (((data.sectionData[s.key] || {}).items || []).length);
    }, 0);
  }, [data]);

  const totalFavs = useMemo(() => (data ? (data.favorites || []).length : 0), [data]);

  // Sync detail item with latest data after edits
  useEffect(() => {
    if (!detailItem || !data) return;
    const sk = detailItem._section;
    const sec = data.sectionData[sk];
    if (!sec) return;
    const fresh = (sec.items || []).find(it => String(it.id) === String(detailItem.id));
    if (fresh && JSON.stringify(fresh) !== JSON.stringify({ ...detailItem, _section: undefined })) {
      setDetailItem({ ...fresh, _section: sk });
    }
  }, [data]);

  // Reset subSub when sub changes
  useEffect(() => { setActiveSubSub('all'); }, [activeSub]);

  // Reset sub when section changes
  useEffect(() => { setActiveSub('all'); }, [activeSection]);

  // ============ Actions ============
  function selectSection(key) {
    if (activeSection === key) {
      // 같은 섹션 다시 클릭 → 트리 토글
      setCollapsedSections(prev => ({ ...prev, [key]: !prev[key] }));
      return;
    }
    setActiveSection(key);
    setSidebarOpen(false);
    setDetailItem(null);
    setActiveSub('all');
    setActiveSubSub('all');
    // 새 섹션 진입 시 펼친 상태로
    setCollapsedSections(prev => ({ ...prev, [key]: false }));
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
  }

  function navigateToSub(subId) {
    setActiveSub(subId);
    setActiveSubSub('all');
    setDetailItem(null);
    setSidebarOpen(false);
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
  }

  function navigateToSubSub(subSubId) {
    setActiveSubSub(subSubId);
    setDetailItem(null);
    setSidebarOpen(false);
    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
  }

  async function saveHomeContent(homeContent) {
    await mutate(draft => {
      draft.homeContent = homeContent;
      return draft;
    });
  }

  async function toggleFav(item) {
    await mutate(draft => {
      const favs = new Set(draft.favorites || []);
      if (favs.has(item.id)) favs.delete(item.id);
      else favs.add(item.id);
      draft.favorites = Array.from(favs);
      return draft;
    });
  }

  async function saveItem(item) {
    const sectionKey = item._section || (editingItem && editingItem._section) || activeSection;
    if (sectionKey === 'favorites') return;
    // Strip internal flags that shouldn't be persisted
    const clean = { ...item };
    delete clean._section;
    delete clean._isNew;
    delete clean._forceEdit;
    delete clean.customTitle;
    setEditingItem(null);
    if (detailItem && String(detailItem.id) === String(clean.id)) {
      setDetailItem({ ...clean, _section: sectionKey });
    }
    await mutate(draft => {
      const sec = draft.sectionData[sectionKey];
      sec.items = sec.items || [];
      const idx = sec.items.findIndex(x => String(x.id) === String(clean.id));
      if (idx >= 0) sec.items[idx] = clean;
      else sec.items.push(clean);
      return draft;
    });
  }

  async function deleteItem(item) {
    const sectionKey = item._section || activeSection;
    setConfirm({
      title: '자료 삭제',
      text: `"${item.title || '제목 없음'}"을(를) 삭제하시겠습니까? 첨부 파일도 함께 삭제됩니다.`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        // Close detail if showing this item
        if (detailItem && String(detailItem.id) === String(item.id)) {
          setDetailItem(null);
        }
        // Files to delete (collected after we identify removed item from latest data)
        let filesToCleanup = [];
        await mutate(draft => {
          const sec = draft.sectionData[sectionKey];
          const removed = (sec.items || []).find(x => String(x.id) === String(item.id));
          if (removed && removed.files) filesToCleanup = removed.files;
          sec.items = (sec.items || []).filter(x => String(x.id) !== String(item.id));
          draft.favorites = (draft.favorites || []).filter(id => id !== item.id);
          return draft;
        });
        // Cleanup files in background (after data save succeeded)
        filesToCleanup.forEach(f => Store.deleteFile(f));
      }
    });
  }

  async function addSubCategory() {
    const name = prompt('새 분류 이름');
    if (!name) return;
    await mutate(draft => {
      const sec = draft.sectionData[activeSection];
      sec.subCategories = sec.subCategories || [];
      sec.subCategories.push({ id: uid(), name: name.trim() });
      return draft;
    });
  }

  async function saveSubCategory(updatedSub) {
    await mutate(draft => {
      const sec = draft.sectionData[activeSection];
      sec.subCategories = (sec.subCategories || []).map(s =>
        String(s.id) === String(updatedSub.id) ? { ...s, ...updatedSub } : s
      );
      return draft;
    });
  }

  async function renameSubCategory(sub) {
    const name = prompt('분류 이름 수정', sub.name);
    if (!name || name === sub.name) return;
    await mutate(draft => {
      const sec = draft.sectionData[activeSection];
      sec.subCategories = sec.subCategories.map(s =>
        String(s.id) === String(sub.id) ? { ...s, name: name.trim() } : s
      );
      return draft;
    });
  }

  async function deleteSubCategory(sub) {
    setConfirm({
      title: '분류 삭제',
      text: `"${sub.name}" 분류와 그 안의 모든 자료를 삭제하시겠습니까?`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        let filesToCleanup = [];
        await mutate(draft => {
          const sec = draft.sectionData[activeSection];
          const itemsToRemove = (sec.items || []).filter(x => String(x.subId) === String(sub.id));
          itemsToRemove.forEach(it => (it.files || []).forEach(f => filesToCleanup.push(f)));
          const removeIds = new Set(itemsToRemove.map(x => x.id));
          sec.items = (sec.items || []).filter(x => !removeIds.has(x.id));
          sec.subCategories = (sec.subCategories || []).filter(s => String(s.id) !== String(sub.id));
          draft.favorites = (draft.favorites || []).filter(id => !removeIds.has(id));
          return draft;
        });
        filesToCleanup.forEach(f => Store.deleteFile(f));
      }
    });
  }

  // ------- 3rd tier (subSub) handlers -------
  async function addSubSubCategory() {
    if (!activeSubObj) { alert('먼저 2단계 분류를 선택하세요.'); return; }
    const name = prompt('새 게시판 이름 (예: 커리큘럼, 포트폴리오)');
    if (!name) return;
    const typeChoice = prompt('게시판 종류를 선택하세요\n1: 일반 게시판 (자료 등록)\n2: 링크 게시판 (URL만 붙여넣으면 미리보기 자동 생성)', '1');
    const boardType = String(typeChoice).trim() === '2' ? 'link' : 'normal';
    await mutate(draft => {
      const sec = draft.sectionData[activeSection];
      sec.subCategories = sec.subCategories.map(s => {
        if (String(s.id) !== String(activeSubObj.id)) return s;
        const subSubs = s.subSubCategories || [];
        subSubs.push({ id: uid(), name: name.trim(), type: boardType });
        return { ...s, subSubCategories: subSubs };
      });
      return draft;
    });
  }

  async function renameSubSubCategory(subSub) {
    const name = prompt('하위 분류 이름 수정', subSub.name);
    if (!name || name === subSub.name) return;
    await mutate(draft => {
      const sec = draft.sectionData[activeSection];
      sec.subCategories = sec.subCategories.map(s => {
        if (String(s.id) !== String(activeSubObj.id)) return s;
        const subSubs = (s.subSubCategories || []).map(ss =>
          String(ss.id) === String(subSub.id) ? { ...ss, name: name.trim() } : ss
        );
        return { ...s, subSubCategories: subSubs };
      });
      return draft;
    });
  }

  /* ── 이동 피커 상태: { ids: [...], label, excludeBoardId } ── */
  const [movePicker, setMovePicker] = useState(null);

  function computeMoveTargets(excludeBoardId) {
    const sec = data.sectionData[activeSection] || {};
    const targets = [];
    (sec.subCategories || []).forEach(sc => {
      (sc.subSubCategories || []).forEach(ss => {
        if (excludeBoardId && String(ss.id) === String(excludeBoardId)) return;
        targets.push({ subId: sc.id, subName: sc.name, boardId: ss.id, boardName: ss.name, type: ss.type });
      });
    });
    return targets;
  }

  async function moveItemsTo(ids, target) {
    const idSet = new Set(ids.map(String));
    let moved = 0;
    await mutate(draft => {
      const dsec = draft.sectionData[activeSection];
      dsec.items = (dsec.items || []).map(it => {
        if (idSet.has(String(it.id))) {
          moved++;
          return { ...it, subId: target.subId, subSubId: target.boardId };
        }
        return it;
      });
      return draft;
    });
    showSync(`${moved}건 이동됨`);
  }

  function moveBoardItems(fromBoard) {
    const sec = data.sectionData[activeSection] || {};
    const ids = (sec.items || [])
      .filter(it => String(it.subSubId || '') === String(fromBoard.id))
      .map(it => it.id);
    if (ids.length === 0) { alert('이 게시판에 자료가 없습니다.'); return; }
    setMovePicker({ ids, label: `"${fromBoard.name}" 자료 ${ids.length}건 이동`, excludeBoardId: fromBoard.id });
  }

  function bulkMove(ids) {
    setMovePicker({ ids, label: `선택한 자료 ${ids.length}건 이동`, excludeBoardId: activeSubSub !== 'all' ? activeSubSub : null });
  }

  function bulkDelete(ids, onDone) {
    setConfirm({
      title: '자료 일괄 삭제',
      text: `선택한 ${ids.length}건을 삭제하시겠습니까? 첨부 파일도 함께 삭제됩니다.`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const idSet = new Set(ids.map(String));
        let filesToCleanup = [];
        await mutate(draft => {
          const dsec = draft.sectionData[activeSection];
          (dsec.items || []).forEach(it => {
            if (idSet.has(String(it.id)) && it.files) filesToCleanup = filesToCleanup.concat(it.files);
          });
          dsec.items = (dsec.items || []).filter(it => !idSet.has(String(it.id)));
          draft.favorites = (draft.favorites || []).filter(id => !idSet.has(String(id)));
          return draft;
        });
        filesToCleanup.forEach(f => Store.deleteFile(f));
        showSync(`${ids.length}건 삭제됨`);
        if (onDone) onDone();
      }
    });
  }

  async function deleteSubSubCategory(subSub) {
    setConfirm({
      title: '하위 분류 삭제',
      text: `"${subSub.name}" 하위 분류 안의 자료들은 분류 없음 상태가 됩니다. 계속하시겠습니까?`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        await mutate(draft => {
          const sec = draft.sectionData[activeSection];
          sec.subCategories = sec.subCategories.map(s => {
            if (String(s.id) !== String(activeSubObj.id)) return s;
            const subSubs = (s.subSubCategories || []).filter(ss => String(ss.id) !== String(subSub.id));
            return { ...s, subSubCategories: subSubs };
          });
          // Clear subSubId from items that had it
          sec.items = (sec.items || []).map(it =>
            String(it.subSubId || '') === String(subSub.id) ? { ...it, subSubId: '' } : it
          );
          return draft;
        });
      }
    });
  }

  async function openNew() {
    if (isFavView) {
      alert('새 자료는 각 섹션에서 등록해 주세요.');
      return;
    }
    if (subCategories.length === 0) {
      const name = prompt('첫 분류의 이름을 입력하세요\n(예: 편집디자인, 3D 애니메이션)');
      if (!name) return;
      const newSubId = uid();
      await mutate(draft => {
        const sec = draft.sectionData[activeSection];
        sec.subCategories = sec.subCategories || [];
        sec.subCategories.push({ id: newSubId, name: name.trim() });
        return draft;
      });
      // proceed with this new sub selected
      const newItem = {
        id: uid(),
        _section: activeSection,
        subId: newSubId,
        subSubId: activeSubSub !== 'all' ? activeSubSub : '',
        title: '',
        desc: '',
        body: '',
        files: [],
        updatedAt: Date.now()
      };
      setDetailItem({ ...newItem, _isNew: true });
      return;
    }
    // Create blank item with reasonable defaults
    const subId = activeSub !== 'all' ? activeSub : (subCategories[0] && subCategories[0].id);
    const newItem = {
      id: uid(),
      _section: activeSection,
      subId: subId,
      subSubId: activeSubSub !== 'all' ? activeSubSub : '',
      title: '',
      desc: '',
      body: '',
      files: [],
      updatedAt: Date.now()
    };
    setDetailItem({ ...newItem, _isNew: true });
  }

  // ============ Render ============
  if (!data) {
    return (
      <div style={{padding:80,textAlign:'center',color:'var(--muted)'}}>
        <div className="loading-bar" style={{margin:'0 auto'}}></div>
        <p style={{marginTop:20}}>데이터 불러오는 중…</p>
      </div>
    );
  }

  const isFav = (id) => (data.favorites || []).includes(id);

  return (
    <>
      <button className="mobile-toggle" onClick={()=>setSidebarOpen(true)} aria-label="메뉴">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div className={'sidebar-overlay ' + (sidebarOpen ? 'open' : '')} onClick={()=>setSidebarOpen(false)}></div>

      <div className="app">
        {/* SIDEBAR */}
        <aside className={'sidebar ' + (sidebarOpen ? 'open' : '')}>
          <div className="brand">
            <div className="brand-row">
              <span className="brand-logo">A.</span>
              <div>
                <div className="brand-mark"><b>AIX</b><span> Academy</span></div>
                <div className="brand-sub">Consultation Library</div>
              </div>
            </div>
          </div>

          <div className="search-box">
            <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <input
              type="text"
              placeholder="검색…"
              value={search}
              onChange={(e)=>setSearch(e.target.value)}
            />
          </div>

          <div className="nav-label">Overview</div>
          <ul className="nav-list">
            <li className={'nav-item ' + (activeSection === 'home' ? 'active' : '')}
                onClick={()=>selectSection('home')}>
              <span className="nav-name">홈</span>
              <span className="nav-count"></span>
            </li>
          </ul>

          <div className="nav-label">Sections</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => !s.special).map(s => {
              const isActiveSection = activeSection === s.key;
              const sec = data.sectionData[s.key] || {};
              const subs = sec.subCategories || [];
              const isCollapsed = !!collapsedSections[s.key];
              const showTree = isActiveSection && !isCollapsed && subs.length > 0;
              return (
                <React.Fragment key={s.key}>
                  <li className={'nav-item ' + (isActiveSection ? 'active' : '')}
                      onClick={()=>selectSection(s.key)}>
                    <span className="nav-name">
                      {subs.length > 0 ? (showTree ? '▾ ' : '▸ ') : ''}
                      {s.name}
                    </span>
                    <span className="nav-count">{sectionCounts[s.key] || 0}</span>
                  </li>
                  {showTree && (
                    <li className="nav-tree">
                      {subs.map(sub => {
                        const isActiveSub = String(activeSub) === String(sub.id);
                        const subSubs = sub.subSubCategories || [];
                        return (
                          <React.Fragment key={sub.id}>
                            <div
                              className={'nav2 ' + (isActiveSub && activeSubSub === 'all' ? 'active' : '') + (isActiveSub ? ' open' : '')}
                              onClick={()=>navigateToSub(sub.id)}
                            >
                              <span className="nav2-caret">{subSubs.length > 0 ? (isActiveSub ? '▾' : '▸') : ''}</span>
                              <span className="nav2-name">{sub.name}</span>
                            </div>
                            {isActiveSub && subSubs.length > 0 && (
                              <div className="nav3-group">
                                {subSubs.map(ss => (
                                  <div
                                    key={ss.id}
                                    className={'nav3 ' + (String(activeSubSub) === String(ss.id) ? 'active' : '')}
                                    onClick={()=>navigateToSubSub(ss.id)}
                                  >
                                    <span className="nav3-name">{ss.name}</span>
                                    {ss.type === 'link' && <span className="nav3-type">링크</span>}
                                  </div>
                                ))}
                              </div>
                            )}
                          </React.Fragment>
                        );
                      })}
                    </li>
                  )}
                </React.Fragment>
              );
            })}
          </ul>

          <div className="nav-label">Pinned</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => s.special).map(s => (
              <li key={s.key}
                  className={'nav-item ' + (activeSection === s.key ? 'active' : '')}
                  onClick={()=>selectSection(s.key)}>
                <span className="nav-name">★ {s.name}</span>
                <span className="nav-count">{sectionCounts[s.key] || 0}</span>
              </li>
            ))}
          </ul>

          <div className="sidebar-footer">
            <span className="user-email">{user ? user.email : ''}</span>
            <div className="sidebar-actions">
              <button className="sidebar-btn" onClick={()=>setEditMode(v => !v)}>
                {editMode ? '잠금' : '편집'}
              </button>
              <button className="sidebar-btn danger" onClick={()=>fbAuth.signOut()}>로그아웃</button>
            </div>
          </div>
        </aside>

        {/* MAIN */}
        <main className="main" style={(activeSection==='home' && !detailItem) ? {background:'transparent',padding:0} : (detailItem ? {background:'transparent',padding:0} : {})}>
          {detailItem ? (
            <Detail
              item={detailItem}
              sectionKey={detailItem._section || activeSection}
              data={data}
              isFav={isFav(detailItem.id)}
              onClose={() => setDetailItem(null)}
              onSave={saveItem}
              onDelete={deleteItem}
              onToggleFav={toggleFav}
              onPreviewMedia={(file) => setMediaPreview(file)}
              editMode={editMode}
            />
          ) : activeSection === 'home' ? (
            <Home
              data={data}
              sectionCounts={sectionCounts}
              onSelectSection={selectSection}
              editMode={editMode}
              onSaveHome={saveHomeContent}
              totalItems={totalItems}
              totalFavs={totalFavs}
              onOpenItem={(it)=>{ selectSection(it._section); setDetailItem(it); }}
            />
          ) : (
            <>
              <header className="main-header">
                <div className="header-text">
                  <div className="header-eyebrow">
                    {isFavView ? 'Pinned Materials' : 'Section ' + (SECTIONS.findIndex(s=>s.key===activeSection)+1).toString().padStart(2,'0')}
                  </div>
                  <h1 className="header-title">
                    {isFavView ? <em>즐겨찾기</em> : <>{currentSection.name}</>}
                  </h1>
                  <div className="header-meta">
                    <span>{currentSection.sub || '자주 보여주는 자료 모음'}</span>
                  </div>
                </div>
                <div className="header-actions">
                  {!isFavView && !activeSubObj && editMode && (
                    <button className="btn ghost" onClick={addSubCategory}>+ 분류 추가</button>
                  )}
                </div>
              </header>

              {isFavView ? (
                /* 즐겨찾기: 그냥 그리드 */
                <div className="grid-wrap">
                  {filteredItems.length === 0 ? (
                    <div className="empty">
                      <div className="empty-mark">∅</div>
                      <div className="empty-title">즐겨찾기가 없습니다</div>
                      <div className="empty-text">카드의 별 아이콘을 눌러 즐겨찾기에 추가하세요.</div>
                    </div>
                  ) : (
                    <div className="grid">
                      {filteredItems.map(item => {
                        const sectionKey = item._section || activeSection;
                        return (
                          <Card
                            key={item.id}
                            item={item}
                            sectionKey={sectionKey}
                            onOpen={(it)=>setDetailItem({...it, _section: sectionKey})}
                            onToggleFav={toggleFav}
                            isFav={isFav(item.id)}
                            onEdit={(it)=>setDetailItem({...it, _section: sectionKey, _forceEdit: true})}
                            onDelete={(it)=>deleteItem({...it, _section: sectionKey})}
                            editMode={editMode}
                          />
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : activeSubObj ? (
                /* 분류가 선택됨 → 분류 페이지 (노션식) */
                <SubCategoryPage
                  sectionKey={activeSection}
                  sub={activeSubObj}
                  data={data}
                  editMode={editMode}
                  onBack={() => navigateToSub('all')}
                  onSaveSub={saveSubCategory}
                  onDelete={deleteSubCategory}
                  activeSubSub={activeSubSub}
                  setActiveSubSub={setActiveSubSub}
                  subSubCategories={subSubCategories}
                  onAddSubSub={addSubSubCategory}
                  onRenameSubSub={renameSubSubCategory}
                  onDeleteSubSub={deleteSubSubCategory}
                  onMoveBoardItems={moveBoardItems}
                  onBulkMove={bulkMove}
                  onBulkDelete={bulkDelete}
                  onCardOpen={(it)=>setDetailItem(it)}
                  onCardEdit={(it)=>setDetailItem({...it, _forceEdit: true})}
                  onCardDelete={(it)=>deleteItem(it)}
                  onToggleFav={toggleFav}
                  isFavId={isFav}
                  onNewItem={openNew}
                  onQuickAddLink={async (preview, board) => {
                    const now = Date.now();
                    await saveItem({
                      id: uid(),
                      title: preview.customTitle || preview.linkTitle || preview.linkDomain || '링크',
                      ...preview,
                      subId: activeSub,
                      subSubId: board ? board.id : (activeSubSub !== 'all' ? activeSubSub : ''),
                      createdAt: now,
                      updatedAt: now,
                      _section: activeSection
                    });
                    showSync('링크 등록됨');
                  }}
                  search={search}
                />
              ) : (
                /* 분류 인덱스 리스트 (랜딩) */
                <div className="subcat-landing">
                  {subCategories.length === 0 && !editMode ? (
                    <div className="empty">
                      <div className="empty-mark">∅</div>
                      <div className="empty-title">분류가 없습니다</div>
                      <div className="empty-text">편집 모드에서 분류를 추가할 수 있습니다.</div>
                    </div>
                  ) : (
                    <div className="index-list">
                      {subCategories.map((sub, idx) => {
                        const c = allItems.filter(it => String(it.subId) === String(sub.id)).length;
                        const subSubCount = (sub.subSubCategories || []).length;
                        return (
                          <div
                            key={sub.id}
                            className="index-row sub"
                            onClick={() => navigateToSub(sub.id)}
                          >
                            <span className="ir-num">{String(idx + 1).padStart(2, '0')}</span>
                            <span className="ir-title">{sub.name}</span>
                            <span className="ir-desc">
                              {sub.tagline || (subSubCount > 0 ? `게시판 ${subSubCount}개` : '')}
                            </span>
                            {editMode ? (
                              <span className="ir-actions" onClick={(e)=>e.stopPropagation()}>
                                <button title="이름 변경" onClick={() => renameSubCategory(sub)}>✎</button>
                                <button title="삭제" onClick={() => deleteSubCategory(sub)}>×</button>
                              </span>
                            ) : (
                              <span className="ir-arrow">→</span>
                            )}
                          </div>
                        );
                      })}
                      {editMode && (
                        <div className="index-row add" onClick={addSubCategory}>
                          <span className="ir-num">+</span>
                          <span className="ir-title" style={{fontSize: 18, color: 'var(--muted)'}}>새 분류 추가</span>
                          <span className="ir-desc"></span>
                          <span className="ir-arrow"></span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </main>
      </div>

      {/* Media Preview (when clicking a file in detail page) */}
      {mediaPreview && (
        <MediaPreview
          file={mediaPreview}
          onClose={()=>setMediaPreview(null)}
        />
      )}

      {/* Confirm */}
      {confirm && (
        <Confirm
          title={confirm.title}
          text={confirm.text}
          danger={confirm.danger}
          onConfirm={confirm.onConfirm}
          onCancel={()=>setConfirm(null)}
        />
      )}
      {movePicker && (
        <MovePickerModal
          title={movePicker.label}
          subtitle="이동할 게시판을 선택하세요"
          targets={computeMoveTargets(movePicker.excludeBoardId)}
          onPick={async (target) => {
            const ids = movePicker.ids;
            setMovePicker(null);
            await moveItemsTo(ids, target);
          }}
          onClose={()=>setMovePicker(null)}
        />
      )}
    </>
  );
}

/* ============ Bootstrap ============ */
const loadingEl = document.getElementById('loading');
const loginScreen = document.getElementById('login-screen');
const loginEmail = document.getElementById('login-email');
const loginPass = document.getElementById('login-password');
const loginBtn = document.getElementById('login-submit');
const loginErr = document.getElementById('login-error');

let appRendered = false;

function setLoginLoading(b) {
  loginBtn.disabled = b;
  loginBtn.textContent = b ? '로그인 중…' : '로그인';
}

async function attemptLogin() {
  const email = loginEmail.value.trim();
  const pass = loginPass.value;
  if (!email || !pass) {
    loginErr.textContent = '이메일과 비밀번호를 입력하세요.';
    return;
  }
  loginErr.textContent = '';
  setLoginLoading(true);
  try {
    await fbAuth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    const msg = (e.code || '').includes('user-not-found') ? '등록되지 않은 이메일입니다.' :
                (e.code || '').includes('wrong-password') ? '비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('invalid-credential') ? '이메일 또는 비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('too-many-requests') ? '시도가 너무 많습니다. 잠시 후 다시 시도하세요.' :
                (e.message || '로그인 실패');
    loginErr.textContent = msg;
    setLoginLoading(false);
  }
}

loginBtn.addEventListener('click', attemptLogin);
[loginEmail, loginPass].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
});

fbAuth.onAuthStateChanged(user => {
  if (user) {
    loginScreen.classList.add('hidden');
    if (!appRendered) {
      appRendered = true;
      ReactDOM.render(React.createElement(App), document.getElementById('root'));
      setTimeout(() => loadingEl.classList.add('hidden'), 100);
    }
  } else {
    loadingEl.classList.add('hidden');
    loginScreen.classList.remove('hidden');
    setLoginLoading(false);
    setTimeout(() => loginEmail.focus(), 100);
  }
});

})();
</script>

</body>
</html>
