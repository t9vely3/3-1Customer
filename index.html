<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBS ACADEMY · 상담 자료실</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <style>
    :root {
      /* === Light Editorial Theme === */
      /* Primary surfaces (page backgrounds) */
      --bg: #F4EFE6;            /* main page background (cream) */
      --bg-soft: #EDE5D6;       /* sidebar, sub-surfaces */
      --bg-paper: #FBF8F2;      /* card, modal forms */
      --bg-elev: #FFFFFF;       /* elevated input bg */

      /* Text */
      --ink: #1A2236;           /* primary text (deep navy) */
      --ink-strong: #0E1525;    /* hero titles, max contrast */
      --muted: #5A6378;         /* secondary text — DARKER for AAA */
      --muted-2: #8089A0;       /* tertiary, hints */

      /* Lines & borders */
      --line: rgba(14,21,37,0.12);
      --line-soft: rgba(14,21,37,0.06);
      --line-strong: rgba(14,21,37,0.20);

      /* Accents */
      --amber: #B8842D;         /* main amber — DARKENED for contrast on cream */
      --amber-soft: #D4A24C;    /* lighter amber for badges/decoration */
      --amber-bg: rgba(184,132,45,0.08);
      --rose: #B65543;

      /* Dark surfaces (for previews / modals only) */
      --dark: #0E1525;
      --dark-soft: #161E30;
      --dark-line: #232C42;
      --on-dark: #F4EFE6;
      --on-dark-muted: #9AA1B0;

      /* Legacy aliases (so existing rules keep working) */
      --ink-soft: var(--bg-soft);
      --ink-line: var(--line);
      --musk: var(--bg-soft);
      --cream: var(--bg);
      --cream-soft: var(--bg-soft);
      --paper: var(--bg-paper);
      --text: var(--ink);
      --muted-light: var(--muted-2);

      --serif: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { -webkit-user-drag: none; user-select: none; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ============ Loading (kept dark) ============ */
    #loading {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      z-index: 9999; gap: 24px;
    }
    #loading.hidden { display: none; }
    .loading-mark {
      font-family: var(--serif);
      font-size: 28px; font-style: italic; letter-spacing: .04em;
      color: var(--on-dark);
    }
    .loading-mark .dot { color: var(--amber-soft); }
    .loading-bar {
      width: 120px; height: 1px; background: rgba(244,239,230,0.15); position: relative; overflow: hidden;
    }
    .loading-bar::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 40%;
      background: var(--amber-soft); animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ============ Login (kept dark for first impression) ============ */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 24px;
    }
    #login-screen.hidden { display: none; }
    #login-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,162,76,0.08), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(184,132,45,0.06), transparent 50%);
      pointer-events: none;
    }
    .login-frame {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 56px 44px 44px;
      background: var(--dark-soft);
      border: 1px solid var(--dark-line);
    }
    .login-frame::before, .login-frame::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border: 1px solid var(--amber-soft);
    }
    .login-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .login-frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    .login-eyebrow {
      font-family: var(--sans);
      font-size: 11px; font-weight: 500; letter-spacing: .3em;
      color: var(--amber-soft); text-transform: uppercase;
      margin-bottom: 16px;
    }
    .login-title {
      font-family: var(--serif);
      font-size: 36px; font-weight: 500; line-height: 1.1;
      color: var(--on-dark); margin-bottom: 8px;
    }
    .login-title em { font-style: italic; color: var(--amber-soft); }
    .login-sub {
      font-size: 13px; color: var(--on-dark-muted);
      margin-bottom: 36px; line-height: 1.6;
    }
    .login-field { margin-bottom: 18px; }
    .login-field label {
      display: block; font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      color: var(--on-dark-muted); margin-bottom: 8px; font-weight: 500;
    }
    .login-field input {
      width: 100%; padding: 12px 0; background: transparent;
      border: none; border-bottom: 1px solid var(--dark-line);
      color: var(--on-dark); font-size: 14px; outline: none;
      transition: border-color .25s;
    }
    .login-field input:focus { border-bottom-color: var(--amber-soft); }
    .login-submit {
      width: 100%; padding: 14px; margin-top: 12px;
      background: var(--amber-soft); color: var(--dark);
      border: none; font-size: 12px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase;
      transition: background .2s;
    }
    .login-submit:hover { background: #E2B871; }
    .login-submit:disabled { background: var(--dark-line); color: var(--on-dark-muted); cursor: not-allowed; }
    .login-error {
      color: #E89B8A; font-size: 12px; text-align: center;
      margin-top: 16px; min-height: 16px; line-height: 1.5;
    }

    /* ============ App Shell ============ */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* ============ Sidebar (light editorial) ============ */
    .sidebar {
      background: var(--bg-soft);
      color: var(--ink);
      padding: 28px 0;
      position: sticky; top: 0;
      height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--line);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(14,21,37,0.18); }

    .brand {
      padding: 0 28px 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }
    .brand-mark {
      font-family: var(--serif);
      font-size: 22px; font-style: italic; font-weight: 500;
      letter-spacing: .02em; line-height: 1;
      color: var(--ink-strong);
    }
    .brand-mark .amp { color: var(--amber); }
    .brand-sub {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin-top: 8px; font-weight: 500;
    }

    .search-box {
      margin: 0 20px 24px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg-paper);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 10px 12px 10px 34px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--ink-strong); }
    .search-box input::placeholder { color: var(--muted-2); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; opacity: .5;
      color: var(--ink);
    }

    .nav-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); padding: 0 28px; margin-bottom: 10px;
      font-weight: 500;
    }
    .nav-list { list-style: none; margin-bottom: 28px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px;
      font-size: 14px; color: var(--ink);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .nav-item:hover { background: rgba(14,21,37,0.04); }
    .nav-item.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber);
    }
    .nav-item .nav-name { font-weight: 500; }
    .nav-item .nav-count {
      font-size: 11px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .nav-item.active .nav-count { color: var(--amber); opacity: .8; }

    .nav-item.nav-sub {
      padding-left: 44px;
      font-size: 13px;
      color: var(--ink); opacity: 0.85;
    }
    .nav-item.nav-sub.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber); opacity: 1;
    }
    .nav-item.nav-subsub {
      padding-left: 60px;
      font-size: 12px;
      color: var(--ink); opacity: 0.7;
    }
    .nav-item.nav-subsub.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber); opacity: 1; font-weight: 600;
    }

    .sidebar-footer {
      margin-top: auto; padding: 20px 28px;
      border-top: 1px solid var(--line);
      font-size: 11px; color: var(--muted);
    }
    .user-email {
      display: block; color: var(--ink); font-size: 12px;
      margin-bottom: 8px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar-actions { display: flex; gap: 8px; }
    .sidebar-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      padding: 7px 10px;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      font-weight: 500;
      transition: border-color .2s, color .2s, background .2s;
    }
    .sidebar-btn:hover { border-color: var(--ink-strong); background: var(--ink-strong); color: var(--bg); }
    .sidebar-btn.danger:hover { border-color: var(--rose); background: var(--rose); color: var(--bg); }

    /* ============ Main Content ============ */
    .main {
      background: var(--bg);
      min-height: 100vh;
      position: relative;
    }
    .main-header {
      padding: 48px 56px 28px;
      border-bottom: 1px solid var(--line-soft);
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 24px;
    }
    .header-text { flex: 1; }
    .header-eyebrow {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); font-weight: 500;
      margin-bottom: 12px;
    }
    .header-title {
      font-family: var(--serif);
      font-size: 38px; font-weight: 700; line-height: 1.1;
      color: var(--ink-strong); letter-spacing: -.02em;
    }
    .header-title em { font-style: normal; color: var(--amber); }
    .header-meta {
      font-size: 13px; color: var(--muted); margin-top: 14px;
      display: flex; gap: 16px; align-items: center;
    }
    .header-meta .dot { width: 3px; height: 3px; background: var(--muted-light); border-radius: 50%; }

    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 10px 18px;
      background: var(--ink-strong); color: var(--bg);
      border: 1px solid var(--ink-strong);
      font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
      font-weight: 500;
      transition: background .2s, color .2s, border-color .2s;
    }
    .btn:hover { background: var(--ink); border-color: var(--ink); }
    .btn.ghost { background: transparent; color: var(--ink-strong); }
    .btn.ghost:hover { background: var(--ink-strong); color: var(--bg); }
    .btn.amber { background: var(--amber); border-color: var(--amber); color: #fff; }
    .btn.amber:hover { background: #9C7022; border-color: #9C7022; }

    /* ============ Sub-categories ============ */
    .subcat-bar {
      padding: 18px 56px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid rgba(14,21,37,0.06);
    }
    .subcat-chip {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid rgba(14,21,37,0.15);
      color: var(--text);
      font-size: 12px; font-weight: 500;
      transition: all .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .subcat-chip:hover { border-color: var(--ink-strong); color: var(--ink-strong); }
    .subcat-chip.active {
      background: var(--ink-strong); color: var(--bg); border-color: var(--ink-strong);
    }
    .subcat-chip .chip-count {
      font-size: 10px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .subcat-chip.active .chip-count { color: var(--bg); opacity: .7; }

    .subcat-add {
      padding: 7px 12px;
      background: transparent;
      border: 1px dashed rgba(14,21,37,0.25);
      color: var(--muted);
      font-size: 12px;
    }
    .subcat-add:hover { color: var(--ink); border-color: var(--ink); }

    /* ============ Card Grid ============ */
    .grid-wrap { padding: 32px 56px 80px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--paper);
      border: 1px solid rgba(14,21,37,0.08);
      transition: border-color .2s, transform .2s;
      cursor: pointer;
      position: relative;
      display: flex; flex-direction: column;
    }
    .card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }
    .card-thumb {
      aspect-ratio: 16 / 10;
      background: var(--cream-soft);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .card-thumb img, .card-thumb video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .card-thumb-placeholder {
      font-family: var(--serif);
      font-size: 32px; font-style: italic;
      color: var(--muted-light);
    }
    .card-thumb-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 8px; background: rgba(14,21,37,0.85);
      color: var(--cream);
      font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    .card-fav {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px;
      background: rgba(251,248,242,0.92);
      border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      backdrop-filter: blur(4px);
    }
    .card-fav:hover { background: var(--paper); }
    .card-fav svg { width: 16px; height: 16px; fill: none; stroke: var(--ink); stroke-width: 1.5; }
    .card-fav.active svg { fill: var(--amber); stroke: var(--amber); }

    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex; flex-direction: row; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .card-body-compact .card-title {
      margin-bottom: 0;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 15px; font-weight: 700; line-height: 1.4;
      color: var(--ink-strong);
      letter-spacing: -.01em;
    }
    .card-edit-actions {
      display: flex; gap: 4px;
      flex-shrink: 0;
    }
    .card-edit-btn {
      width: 26px; height: 26px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .15s;
    }
    .card-edit-btn:hover { border-color: var(--line-strong); color: var(--ink); }

    /* ============ Empty state ============ */
    .empty {
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
    }
    .empty-mark {
      font-family: var(--serif);
      font-size: 64px; font-style: italic;
      color: var(--line-strong);
      margin-bottom: 12px;
    }
    .empty-title {
      font-family: var(--serif);
      font-size: 22px; color: var(--ink-strong);
      margin-bottom: 6px;
    }
    .empty-text { font-size: 13px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ============ Fullscreen Modal (Preview) ============ */
    /* ============ Fullscreen Modal (kept dark — best for media) ============ */
    .modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.94);
      z-index: 9500;
      display: flex; flex-direction: column;
      backdrop-filter: blur(8px);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid rgba(244,239,230,0.1);
      color: var(--on-dark);
      flex-shrink: 0;
    }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-eyebrow {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber-soft); margin-bottom: 4px; font-weight: 500;
    }
    .modal-title {
      font-family: var(--serif);
      font-size: 24px; font-weight: 500;
      color: var(--on-dark);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .modal-actions { display: flex; gap: 8px; align-items: center; }
    .modal-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(244,239,230,0.2);
      color: var(--on-dark);
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      transition: all .2s;
    }
    .modal-btn:hover { border-color: var(--amber-soft); color: var(--amber-soft); }
    .modal-btn.close { padding: 8px 14px; }

    .modal-body {
      flex: 1; overflow: auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
    }
    .modal-preview {
      background: var(--dark-soft);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      overflow: auto;
    }
    .modal-preview img, .modal-preview video {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-preview iframe {
      width: 100%; max-width: 1200px;
      aspect-ratio: 16/9;
      border: none; background: #000;
    }
    .modal-preview .pdf-pages {
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 900px;
    }
    .modal-preview .pdf-pages canvas {
      width: 100%; height: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .modal-preview-empty {
      text-align: center; color: var(--on-dark-muted);
    }
    .modal-preview-empty .mark {
      font-family: var(--serif); font-size: 80px; font-style: italic;
      color: rgba(244,239,230,0.18); margin-bottom: 16px;
    }

    .modal-info {
      background: var(--dark);
      color: var(--on-dark);
      padding: 36px;
      overflow-y: auto;
      border-left: 1px solid var(--dark-line);
    }
    .info-section { margin-bottom: 28px; }
    .info-section:last-child { margin-bottom: 0; }
    .info-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--on-dark-muted); font-weight: 500;
      margin-bottom: 8px;
    }
    .info-value {
      font-size: 14px; line-height: 1.6;
      color: var(--on-dark);
      white-space: pre-wrap; word-break: break-word;
    }
    .info-value a { color: var(--amber-soft); text-decoration: none; border-bottom: 1px solid rgba(212,162,76,0.3); }
    .info-value a:hover { border-bottom-color: var(--amber-soft); }
    .info-value.serif {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.3;
    }

    /* ============ Forms / Editor Modal ============ */
    .form-modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.7);
      z-index: 9600;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    .form-frame {
      background: var(--paper);
      width: 100%; max-width: 640px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      border: 1px solid var(--ink-line);
      position: relative;
    }
    .form-header {
      padding: 28px 36px 20px;
      border-bottom: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .form-header h3 {
      font-family: var(--serif);
      font-size: 26px; font-weight: 500;
      color: var(--ink);
    }
    .form-close {
      background: none; border: none;
      font-size: 24px; color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .form-close:hover { color: var(--ink); }
    .form-body {
      padding: 28px 36px;
      overflow-y: auto;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      margin-bottom: 8px;
    }
    .field label .required { color: var(--rose); }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--cream);
      border: 1px solid rgba(14,21,37,0.12);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--ink);
    }
    .field textarea {
      min-height: 90px; resize: vertical;
      font-family: inherit;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .file-drop {
      border: 1px dashed rgba(14,21,37,0.2);
      padding: 24px; text-align: center;
      background: var(--cream);
      transition: border-color .2s, background .2s;
    }
    .file-drop:hover { border-color: var(--ink); background: var(--paper); }
    .file-drop.dragging { border-color: var(--amber); background: rgba(212,162,76,0.05); }
    .file-drop .mark {
      font-family: var(--serif); font-size: 32px; font-style: italic;
      color: var(--muted-light); margin-bottom: 6px;
    }
    .file-drop p { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .file-drop button {
      padding: 6px 14px;
      background: var(--ink); color: var(--cream);
      border: none;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
    }
    .file-list {
      margin-top: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .file-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--cream-soft);
      font-size: 12px;
    }
    .file-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .file-row button {
      background: none; border: none; color: var(--muted);
      font-size: 14px; padding: 0 6px;
    }
    .file-row button:hover { color: var(--rose); }

    .form-foot {
      padding: 20px 36px;
      border-top: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
    }
    .form-foot .left { display: flex; gap: 8px; }
    .form-foot .right { display: flex; gap: 10px; }

    /* ============ Home (light editorial) ============ */
    .home {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      position: relative;
      overflow: hidden;
    }
    .home::before {
      content: ''; position: absolute; top: 0; right: 0; width: 60%; height: 720px;
      background: radial-gradient(circle at 70% 30%, rgba(184,132,45,0.10), transparent 55%);
      pointer-events: none;
    }
    .home::after {
      content: ''; position: absolute; top: 60px; right: 60px;
      width: 480px; height: 480px;
      border: 1px solid rgba(184,132,45,0.18);
      border-radius: 50%;
      pointer-events: none;
    }
    .home-orbit {
      position: absolute; top: 140px; right: 140px;
      width: 320px; height: 320px;
      border: 1px solid rgba(184,132,45,0.13);
      border-radius: 50%;
      pointer-events: none;
    }
    .home-inner { position: relative; z-index: 1; padding: 56px 64px 80px; }

    .home-topbar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; letter-spacing: .3em; color: var(--muted);
      text-transform: uppercase; font-weight: 500;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 80px;
    }
    .home-topbar .right { display: flex; gap: 20px; align-items: center; }

    .home-hero { margin-bottom: 64px; max-width: 720px; }
    .home-eyebrow {
      font-size: 11px; letter-spacing: .35em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .home-eyebrow::before {
      content: ''; width: 24px; height: 1px; background: var(--amber);
    }
    .home-title {
      font-family: var(--serif);
      font-size: 64px; font-weight: 700; line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--ink-strong);
      margin-bottom: 28px;
    }
    .home-title em { font-style: normal; color: var(--amber); }
    .home-tagline {
      font-size: 16px; color: var(--ink); line-height: 1.7;
      max-width: 520px;
      white-space: pre-wrap;
      opacity: 0.78;
    }

    .home-title-edit, .home-tagline-edit {
      width: 100%;
      background: var(--bg-paper);
      border: 1px dashed rgba(184,132,45,0.5);
      color: var(--ink);
      font-family: inherit; font-size: inherit; font-weight: inherit;
      line-height: inherit; letter-spacing: inherit;
      padding: 8px 12px;
      outline: none;
      resize: vertical;
    }
    .home-title-edit { font-family: var(--serif); color: var(--ink-strong); }
    .home-title-edit:focus, .home-tagline-edit:focus {
      border-color: var(--amber); border-style: solid;
    }

    .home-stats {
      display: flex; gap: 56px;
      padding: 24px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 80px;
    }
    .home-stat-num {
      font-family: var(--serif);
      font-size: 44px; font-weight: 500; line-height: 1;
      color: var(--ink-strong);
      font-variant-numeric: tabular-nums;
    }
    .home-stat-num.amber { color: var(--amber); }
    .home-stat-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin-top: 8px; font-weight: 500;
    }

    .home-section-label {
      font-size: 11px; letter-spacing: .35em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .home-section-label::before {
      content: ''; width: 24px; height: 1px; background: var(--muted-2);
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .home-card {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 24px 24px;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, transform .2s, box-shadow .2s, background .2s;
      min-height: 168px;
      display: flex; flex-direction: column;
    }
    .home-card:hover {
      border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14,21,37,0.08);
    }
    .home-card.featured {
      background: var(--amber-bg);
      border-color: var(--amber);
    }
    .home-card-num {
      font-family: var(--serif);
      font-size: 30px; font-style: italic; font-weight: 500;
      color: var(--amber);
      line-height: 1; margin-bottom: 18px;
    }
    .home-card-title {
      font-size: 15px; font-weight: 600;
      color: var(--ink-strong);
      margin-bottom: 6px;
      letter-spacing: -.005em;
    }
    .home-card-desc {
      font-size: 13px; color: var(--muted);
      line-height: 1.5; margin-bottom: 14px;
    }
    .home-card-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
    }
    .home-card-foot .arrow {
      color: var(--amber); font-size: 14px; letter-spacing: 0;
    }
    .home-card-count { font-variant-numeric: tabular-nums; }
    .home-card-badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
    }

    .home-edit-actions {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .home-edit-btn {
      padding: 8px 18px;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      font-weight: 600;
      background: var(--ink-strong); color: var(--bg);
      border: 1px solid var(--ink-strong);
      transition: opacity .2s;
    }
    .home-edit-btn:hover { opacity: 0.85; }
    .home-edit-btn.ghost {
      background: transparent; color: var(--ink);
      border-color: var(--line-strong);
    }
    .home-edit-btn.ghost:hover { border-color: var(--ink); }

    @media (max-width: 1100px) {
      .home-grid { grid-template-columns: repeat(3, 1fr); }
      .home-title { font-size: 56px; }
      .home-inner { padding: 44px 40px 60px; }
    }
    @media (max-width: 820px) {
      .home-grid { grid-template-columns: repeat(2, 1fr); }
      .home-title { font-size: 40px; }
      .home-inner { padding: 80px 24px 48px; }
      .home-stats { gap: 32px; flex-wrap: wrap; }
      .home-stat-num { font-size: 32px; }
      .home::after, .home-orbit { display: none; }
    }
    @media (max-width: 480px) {
      .home-grid { grid-template-columns: 1fr; }
      .home-title { font-size: 32px; }
    }

    /* ============ SubCategory Landing (분류 카드 그리드) ============ */
    .subcat-landing { padding: 32px 56px 80px; }
    .subcat-landing-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 920px;
    }
    .subcat-card {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 28px 24px;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      min-height: 168px;
      display: flex; flex-direction: column;
    }
    .subcat-card:hover {
      border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14,21,37,0.06);
    }
    .subcat-card-num {
      font-family: var(--serif);
      font-size: 28px; font-weight: 700; font-style: italic;
      color: var(--amber);
      line-height: 1; margin-bottom: 16px;
    }
    .subcat-card-title {
      font-size: 19px; font-weight: 700;
      color: var(--ink-strong);
      margin-bottom: 6px;
      letter-spacing: -.015em;
    }
    .subcat-card-meta {
      font-size: 12px; color: var(--muted);
      margin-bottom: 14px; line-height: 1.5;
    }
    .subcat-card-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted);
      letter-spacing: .1em;
    }
    .subcat-card-foot .arrow {
      color: var(--amber); font-size: 16px;
    }
    .subcat-card-actions {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .subcat-card:hover .subcat-card-actions { opacity: 1; }
    .subcat-card-action {
      width: 24px; height: 24px;
      background: var(--bg-paper); border: 1px solid var(--line);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11px;
    }
    .subcat-card-action:hover { color: var(--ink); border-color: var(--ink); }
    .subcat-add-card {
      background: transparent;
      border: 1px dashed var(--line-strong);
      padding: 28px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      min-height: 168px;
    }
    .subcat-add-card:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

    /* ============ SubCategory Detail Page (분류의 노션 페이지) ============ */
    .subcat-page {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .subcat-page-cover {
      height: 120px;
      background: linear-gradient(135deg, rgba(184,132,45,0.18), rgba(14,21,37,0.06));
    }
    .subcat-page-body {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 36px 60px;
    }

    @media (max-width: 820px) {
      .subcat-landing { padding: 24px; }
      .subcat-landing-grid { grid-template-columns: 1fr; }
      .subcat-page-body { padding: 24px 20px 60px; }
    }

    /* ============ Detail Page (Notion-style) ============ */
    .detail {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .detail-topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 32px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 12px; color: var(--muted);
      position: sticky; top: 0; background: var(--bg);
      z-index: 100;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb a, .breadcrumb span.crumb {
      color: var(--muted); cursor: pointer; font-size: 12px;
      background: none; border: none; font-family: inherit;
      padding: 0;
    }
    .breadcrumb a:hover, .breadcrumb span.crumb:hover { color: var(--ink); }
    .breadcrumb .sep { color: var(--amber); font-weight: 500; }
    .breadcrumb .current { color: var(--ink-strong); font-weight: 600; }

    .detail-actions { display: flex; gap: 6px; }
    .detail-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      font-weight: 500;
      transition: all .15s;
      font-family: inherit;
    }
    .detail-btn:hover { background: var(--ink-strong); color: var(--bg); border-color: var(--ink-strong); }
    .detail-btn.amber { background: var(--amber); color: #fff; border-color: var(--amber); }
    .detail-btn.amber:hover { background: #9C7022; border-color: #9C7022; }
    .detail-btn.fav.active { background: var(--amber); color: #fff; border-color: var(--amber); }
    .detail-btn.danger:hover { background: var(--rose); border-color: var(--rose); }

    .detail-cover {
      height: 140px;
      background: linear-gradient(135deg, rgba(184,132,45,0.15), rgba(14,21,37,0.06));
    }

    .detail-body {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 36px 80px;
    }
    .detail-eyebrow {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
      margin-bottom: 12px;
    }
    .detail-title {
      font-size: 36px; font-weight: 700; line-height: 1.15;
      color: var(--ink-strong); letter-spacing: -.02em;
      margin-bottom: 28px;
    }
    .detail-title-input {
      width: 100%;
      font-size: 36px; font-weight: 700; line-height: 1.15;
      color: var(--ink-strong); letter-spacing: -.02em;
      background: transparent;
      border: 1px dashed rgba(184,132,45,0.4);
      padding: 4px 8px;
      outline: none;
      font-family: inherit;
    }
    .detail-title-input:focus { border-style: solid; border-color: var(--amber); }

    /* Property table */
    .props {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 4px 18px;
      margin-bottom: 32px;
    }
    .props-row {
      display: grid; grid-template-columns: 130px 1fr;
      padding: 11px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13px;
      align-items: start;
    }
    .props-row:last-child { border-bottom: none; }
    .props-label {
      color: var(--muted); font-weight: 500;
      font-size: 12px;
    }
    .props-value { color: var(--ink); white-space: pre-wrap; word-break: break-word; }
    .props-value a { color: var(--amber); text-decoration: none; border-bottom: 1px solid rgba(184,132,45,0.3); }
    .props-value input, .props-value textarea, .props-value select {
      width: 100%;
      background: transparent;
      border: 1px solid var(--line);
      padding: 6px 8px;
      font-size: 13px;
      color: var(--ink);
      font-family: inherit;
      outline: none;
    }
    .props-value input:focus, .props-value textarea:focus, .props-value select:focus {
      border-color: var(--ink-strong);
    }
    .props-value textarea { min-height: 60px; resize: vertical; }

    /* Body editor */
    .body-section { margin-top: 28px; }
    .body-label {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      margin-bottom: 14px;
    }

    .editor-toolbar {
      display: flex; gap: 4px; flex-wrap: wrap;
      padding: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-bottom: none;
      position: sticky; top: 50px; z-index: 50;
    }
    .toolbar-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      transition: background .12s, border-color .12s;
      min-width: 30px;
      font-family: inherit;
    }
    .toolbar-btn:hover { background: var(--bg-paper); border-color: var(--line); }
    .toolbar-btn.h1 { font-weight: 700; }
    .toolbar-sep {
      width: 1px; background: var(--line); margin: 4px 4px;
    }

    .editor {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 24px 28px;
      min-height: 320px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--ink);
      outline: none;
    }
    .editor:focus { border-color: var(--ink-strong); }
    .editor[contenteditable="true"]:empty::before {
      content: attr(data-placeholder);
      color: var(--muted-2);
      pointer-events: none;
      display: block;
    }
    .editor h1 { font-size: 26px; font-weight: 700; margin: 18px 0 10px; line-height: 1.2; color: var(--ink-strong); }
    .editor h2 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; line-height: 1.3; color: var(--ink-strong); }
    .editor h3 { font-size: 16px; font-weight: 700; margin: 14px 0 6px; color: var(--ink-strong); }
    .editor p { margin: 0 0 10px; }
    .editor ul, .editor ol { padding-left: 24px; margin: 0 0 12px; }
    .editor li { margin-bottom: 4px; }
    .editor blockquote {
      margin: 14px 0;
      padding: 12px 18px;
      border-left: 3px solid var(--amber);
      background: var(--amber-bg);
      color: var(--ink);
      font-size: 14px;
    }
    .editor a { color: var(--amber); border-bottom: 1px solid rgba(184,132,45,0.3); text-decoration: none; }
    .editor strong { font-weight: 700; color: var(--ink-strong); }
    .editor em { font-style: italic; }
    .editor img { max-width: 100%; height: auto; margin: 8px 0; }

    .body-readonly {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 32px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--ink);
      min-height: 80px;
    }
    .body-readonly h1 { font-size: 26px; font-weight: 700; margin: 22px 0 12px; line-height: 1.2; color: var(--ink-strong); }
    .body-readonly h1:first-child { margin-top: 0; }
    .body-readonly h2 { font-size: 20px; font-weight: 700; margin: 20px 0 10px; line-height: 1.3; color: var(--ink-strong); }
    .body-readonly h3 { font-size: 16px; font-weight: 700; margin: 16px 0 6px; color: var(--ink-strong); }
    .body-readonly p { margin: 0 0 12px; }
    .body-readonly ul, .body-readonly ol { padding-left: 24px; margin: 0 0 14px; }
    .body-readonly li { margin-bottom: 5px; }
    .body-readonly blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 3px solid var(--amber);
      background: var(--amber-bg);
      font-size: 14px;
    }
    .body-readonly a { color: var(--amber); border-bottom: 1px solid rgba(184,132,45,0.3); text-decoration: none; }
    .body-readonly a:hover { border-bottom-color: var(--amber); }
    .body-readonly img { max-width: 100%; height: auto; margin: 10px 0; }
    .body-readonly:empty { display: none; }

    /* Media gallery in detail */
    .detail-media { margin-top: 36px; }
    .detail-media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .detail-media-item {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: border-color .15s;
      overflow: hidden;
    }
    .detail-media-item:hover { border-color: var(--amber); }
    .detail-media-thumb {
      aspect-ratio: 16 / 10;
      background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--muted-2);
      overflow: hidden;
    }
    .detail-media-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-media-info {
      padding: 10px 12px;
      font-size: 12px; color: var(--ink);
    }
    .detail-media-info .type {
      font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--amber); font-weight: 600; margin-bottom: 3px;

/* PDF Viewer */
function PdfPreview({ url }) {
  const containerRef = useRef(null);
  const [error, setError] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const container = containerRef.current;
    if (!container || !window.pdfjsLib) return;
    container.innerHTML = '';
    setError(null);
    (async () => {
      try {
        const pdf = await window.pdfjsLib.getDocument({ url, withCredentials: false }).promise;
        if (cancelled) return;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          if (cancelled) return;
          container.appendChild(canvas);
        }
      } catch(e) {
        console.error(e);
        if (!cancelled) setError('PDF를 불러올 수 없습니다.');
      }
    })();
    return () => { cancelled = true; };
  }, [url]);
  if (error) return <div className="modal-preview-empty"><p>{error}</p></div>;
  return <div className="pdf-pages" ref={containerRef}></div>;
}

              <div className="info-section" key={f.key}>

          {(imageFiles.length > 1 || videoFiles.length > 1 || pdfFiles.length > 1 || otherFiles.length > 0) && (

              <div className="info-value">
                {files.map(f => (
                  <div key={f.id} style={{padding:'8px 0',borderBottom:'1px solid rgba(244,239,230,0.08)'}}>

            <div className="info-section">

/* Edit Form Modal */
function EditModal({ item, sectionKey, subCategories, onClose, onSave, onSubCatAdd }) {
  const isNew = !item || !item.id;
  const fields = SECTION_FIELDS[sectionKey] || [];
  const [form, setForm] = useState(() => {
    const f = {};
    fields.forEach(field => { f[field.key] = (item && item[field.key]) || ''; });
    f.subId = (item && item.subId) || (subCategories[0] && subCategories[0].id) || '';
    f.files = (item && item.files) ? [...item.files] : [];
    return f;
  });
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  function setField(key, val) { setForm(prev => ({ ...prev, [key]: val })); }

  async function handleFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    setProgress(0);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const f = filesArr[i];
        const result = await Store.uploadFile(f, p => setProgress(p));
        newFiles.push(result);
      }
      setForm(prev => ({ ...prev, files: [...(prev.files||[]), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
      setProgress(0);
    }
  }

  function removeFile(fileId) {
    setForm(prev => ({ ...prev, files: prev.files.filter(f => f.id !== fileId) }));
  }

  function submit() {
    const titleField = fields.find(f => f.isTitle);
    if (titleField && !form[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({
      ...item,
      ...form,
      id: item && item.id ? item.id : uid(),
      updatedAt: Date.now()
    });
  }

  const titleField = fields.find(f => f.isTitle) || fields[0];

  return (
    <div className="form-modal" onClick={onClose}>
      <div className="form-frame" onClick={(e)=>e.stopPropagation()}>
        <div className="form-header">
          <h3>{isNew ? '새 자료 등록' : '자료 편집'}</h3>
          <button className="form-close" onClick={onClose}>×</button>
        </div>
        <div className="form-body">
          {/* Sub category selector */}
          {subCategories.length > 0 && (
            <div className="field">
              <label>분류</label>
              <select value={form.subId} onChange={e => setField('subId', e.target.value)}>
                {subCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
          )}

          {fields.map(f => (
            <div className="field" key={f.key}>
              <label>{f.label} {f.required && <span className="required">*</span>}</label>
              {f.type === 'textarea' ? (
                <textarea
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              ) : f.type === 'select' ? (
                <select value={form[f.key] || ''} onChange={e => setField(f.key, e.target.value)}>
                  <option value="">선택</option>
                  {(f.options||[]).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
              ) : (
                <input
                  type={f.type === 'date' ? 'date' : 'text'}
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              )}
            </div>
          ))}

          {/* Files */}
          <div className="field">
            <label>첨부 파일 (이미지 / PDF / 영상)</label>
            <div
              className={'file-drop ' + (dragging ? 'dragging' : '')}
              onDragOver={(e)=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={(e)=>{
                e.preventDefault();
                setDragging(false);
                handleFiles(e.dataTransfer.files);
              }}
            >
              <div className="mark">+</div>
              <p>파일을 끌어다 놓거나 버튼으로 선택하세요</p>
              <button onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={uploading}>
                {uploading ? `업로드 ${Math.round(progress*100)}%` : '파일 선택'}
              </button>
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{display:'none'}}
                onChange={(e)=>handleFiles(e.target.files)}
              />
            </div>
            {form.files && form.files.length > 0 && (
              <div className="file-list">
                {form.files.map(f => (
                  <div className="file-row" key={f.id}>
                    <span className="name">{f.name}</span>
                    <button onClick={()=>removeFile(f.id)} title="삭제">×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="form-foot">
          <div className="left">
            {subCategories.length === 0 && (
              <button className="btn ghost" onClick={onSubCatAdd}>+ 분류 추가</button>
            )}
          </div>
          <div className="right">
            <button className="btn ghost" onClick={onClose}>취소</button>
            <button className="btn amber" onClick={submit} disabled={uploading}>
              {isNew ? '등록' : '저장'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
