<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBS ACADEMY · 상담 자료실</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <style>
    :root {
      --ink: #0E1525;
      --ink-soft: #161E30;
      --ink-line: #232C42;
      --musk: #2A3447;
      --cream: #F4EFE6;
      --cream-soft: #EDE5D6;
      --paper: #FBF8F2;
      --amber: #D4A24C;
      --amber-soft: #E2B871;
      --rose: #C97264;
      --text: #1A2236;
      --muted: #6E7689;
      --muted-light: #9AA1B0;

      --serif: 'Cormorant Garamond', 'Noto Serif KR', serif;
      --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { -webkit-user-drag: none; user-select: none; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ============ Loading ============ */
    #loading {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      z-index: 9999; gap: 24px;
    }
    #loading.hidden { display: none; }
    .loading-mark {
      font-family: var(--serif);
      font-size: 28px; font-style: italic; letter-spacing: .04em;
      color: var(--cream);
    }
    .loading-mark .dot { color: var(--amber); }
    .loading-bar {
      width: 120px; height: 1px; background: rgba(244,239,230,0.15); position: relative; overflow: hidden;
    }
    .loading-bar::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 40%;
      background: var(--amber); animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ============ Login ============ */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 24px;
    }
    #login-screen.hidden { display: none; }
    #login-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,162,76,0.08), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201,114,100,0.06), transparent 50%);
      pointer-events: none;
    }
    .login-frame {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 56px 44px 44px;
      background: var(--ink-soft);
      border: 1px solid var(--ink-line);
    }
    .login-frame::before, .login-frame::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border: 1px solid var(--amber);
    }
    .login-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .login-frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    .login-eyebrow {
      font-family: var(--sans);
      font-size: 11px; font-weight: 500; letter-spacing: .3em;
      color: var(--amber); text-transform: uppercase;
      margin-bottom: 16px;
    }
    .login-title {
      font-family: var(--serif);
      font-size: 36px; font-weight: 500; line-height: 1.1;
      color: var(--cream); margin-bottom: 8px;
    }
    .login-title em { font-style: italic; color: var(--amber); }
    .login-sub {
      font-size: 13px; color: var(--muted-light);
      margin-bottom: 36px; line-height: 1.6;
    }
    .login-field { margin-bottom: 18px; }
    .login-field label {
      display: block; font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted-light); margin-bottom: 8px; font-weight: 500;
    }
    .login-field input {
      width: 100%; padding: 12px 0; background: transparent;
      border: none; border-bottom: 1px solid var(--ink-line);
      color: var(--cream); font-size: 14px; outline: none;
      transition: border-color .25s;
    }
    .login-field input:focus { border-bottom-color: var(--amber); }
    .login-submit {
      width: 100%; padding: 14px; margin-top: 12px;
      background: var(--amber); color: var(--ink);
      border: none; font-size: 12px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase;
      transition: background .2s;
    }
    .login-submit:hover { background: var(--amber-soft); }
    .login-submit:disabled { background: var(--musk); color: var(--muted-light); cursor: not-allowed; }
    .login-error {
      color: var(--rose); font-size: 12px; text-align: center;
      margin-top: 16px; min-height: 16px; line-height: 1.5;
    }

    /* ============ App Shell ============ */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* ============ Sidebar ============ */
    .sidebar {
      background: var(--ink);
      color: var(--cream);
      padding: 28px 0;
      position: sticky; top: 0;
      height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--ink-line);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--musk); }

    .brand {
      padding: 0 28px 24px;
      border-bottom: 1px solid var(--ink-line);
      margin-bottom: 24px;
    }
    .brand-mark {
      font-family: var(--serif);
      font-size: 22px; font-style: italic; font-weight: 500;
      letter-spacing: .02em; line-height: 1;
      color: var(--cream);
    }
    .brand-mark .amp { color: var(--amber); }
    .brand-sub {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted-light); margin-top: 8px; font-weight: 500;
    }

    .search-box {
      margin: 0 20px 24px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--ink-soft);
      border: 1px solid var(--ink-line);
      color: var(--cream);
      padding: 10px 12px 10px 34px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--amber); }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; opacity: .55;
    }

    .nav-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); padding: 0 28px; margin-bottom: 10px;
      font-weight: 500;
    }
    .nav-list { list-style: none; margin-bottom: 28px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px;
      font-size: 14px; color: var(--cream);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .nav-item:hover { background: var(--ink-soft); }
    .nav-item.active {
      background: var(--ink-soft);
      border-left-color: var(--amber);
      color: var(--amber);
    }
    .nav-item .nav-name { font-weight: 500; }
    .nav-item .nav-count {
      font-size: 11px; color: var(--muted-light);
      font-variant-numeric: tabular-nums;
    }
    .nav-item.active .nav-count { color: var(--amber-soft); }

    .sidebar-footer {
      margin-top: auto; padding: 20px 28px;
      border-top: 1px solid var(--ink-line);
      font-size: 11px; color: var(--muted);
    }
    .user-email {
      display: block; color: var(--cream); font-size: 12px;
      margin-bottom: 8px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar-actions { display: flex; gap: 8px; }
    .sidebar-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--ink-line);
      color: var(--cream);
      padding: 7px 10px;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      transition: border-color .2s, color .2s;
    }
    .sidebar-btn:hover { border-color: var(--amber); color: var(--amber); }
    .sidebar-btn.danger:hover { border-color: var(--rose); color: var(--rose); }

    /* ============ Main Content ============ */
    .main {
      background: var(--cream);
      min-height: 100vh;
      position: relative;
    }
    .main-header {
      padding: 48px 56px 28px;
      border-bottom: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 24px;
    }
    .header-text { flex: 1; }
    .header-eyebrow {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); font-weight: 500;
      margin-bottom: 12px;
    }
    .header-title {
      font-family: var(--serif);
      font-size: 44px; font-weight: 500; line-height: 1;
      color: var(--ink); letter-spacing: -.005em;
    }
    .header-title em { font-style: italic; }
    .header-meta {
      font-size: 13px; color: var(--muted); margin-top: 14px;
      display: flex; gap: 16px; align-items: center;
    }
    .header-meta .dot { width: 3px; height: 3px; background: var(--muted-light); border-radius: 50%; }

    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 10px 18px;
      background: var(--ink); color: var(--cream);
      border: 1px solid var(--ink);
      font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
      font-weight: 500;
      transition: background .2s, color .2s;
    }
    .btn:hover { background: var(--musk); }
    .btn.ghost { background: transparent; color: var(--ink); }
    .btn.ghost:hover { background: var(--ink); color: var(--cream); }
    .btn.amber { background: var(--amber); border-color: var(--amber); color: var(--ink); }
    .btn.amber:hover { background: var(--amber-soft); border-color: var(--amber-soft); }

    /* ============ Sub-categories ============ */
    .subcat-bar {
      padding: 18px 56px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid rgba(14,21,37,0.06);
    }
    .subcat-chip {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid rgba(14,21,37,0.15);
      color: var(--text);
      font-size: 12px; font-weight: 500;
      transition: all .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .subcat-chip:hover { border-color: var(--ink); }
    .subcat-chip.active {
      background: var(--ink); color: var(--cream); border-color: var(--ink);
    }
    .subcat-chip .chip-count {
      font-size: 10px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .subcat-chip.active .chip-count { color: var(--cream-soft); opacity: .7; }

    .subcat-add {
      padding: 7px 12px;
      background: transparent;
      border: 1px dashed rgba(14,21,37,0.25);
      color: var(--muted);
      font-size: 12px;
    }
    .subcat-add:hover { color: var(--ink); border-color: var(--ink); }

    /* ============ Card Grid ============ */
    .grid-wrap { padding: 32px 56px 80px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--paper);
      border: 1px solid rgba(14,21,37,0.08);
      transition: border-color .2s, transform .2s;
      cursor: pointer;
      position: relative;
      display: flex; flex-direction: column;
    }
    .card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }
    .card-thumb {
      aspect-ratio: 16 / 10;
      background: var(--cream-soft);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .card-thumb img, .card-thumb video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .card-thumb-placeholder {
      font-family: var(--serif);
      font-size: 32px; font-style: italic;
      color: var(--muted-light);
    }
    .card-thumb-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 8px; background: rgba(14,21,37,0.85);
      color: var(--cream);
      font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    .card-fav {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px;
      background: rgba(251,248,242,0.92);
      border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      backdrop-filter: blur(4px);
    }
    .card-fav:hover { background: var(--paper); }
    .card-fav svg { width: 16px; height: 16px; fill: none; stroke: var(--ink); stroke-width: 1.5; }
    .card-fav.active svg { fill: var(--amber); stroke: var(--amber); }

    .card-body {
      padding: 18px 18px 20px;
      flex: 1;
      display: flex; flex-direction: column;
    }
    .card-subcat {
      font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
      color: var(--amber); font-weight: 500; margin-bottom: 8px;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 20px; font-weight: 500; line-height: 1.25;
      color: var(--ink); margin-bottom: 8px;
      letter-spacing: -.005em;
    }
    .card-desc {
      font-size: 13px; color: var(--muted); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 14px;
    }
    .card-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px;
      border-top: 1px solid rgba(14,21,37,0.06);
      font-size: 11px; color: var(--muted-light);
    }
    .card-meta { display: flex; gap: 10px; align-items: center; }

    /* ============ Empty state ============ */
    .empty {
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
    }
    .empty-mark {
      font-family: var(--serif);
      font-size: 64px; font-style: italic;
      color: var(--cream-soft);
      margin-bottom: 12px;
    }
    .empty-title {
      font-family: var(--serif);
      font-size: 22px; color: var(--ink);
      margin-bottom: 6px;
    }
    .empty-text { font-size: 13px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ============ Fullscreen Modal (Preview) ============ */
    .modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.92);
      z-index: 9500;
      display: flex; flex-direction: column;
      backdrop-filter: blur(8px);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid rgba(244,239,230,0.1);
      color: var(--cream);
      flex-shrink: 0;
    }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-eyebrow {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 4px; font-weight: 500;
    }
    .modal-title {
      font-family: var(--serif);
      font-size: 24px; font-weight: 500;
      color: var(--cream);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .modal-actions { display: flex; gap: 8px; align-items: center; }
    .modal-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(244,239,230,0.2);
      color: var(--cream);
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      transition: all .2s;
    }
    .modal-btn:hover { border-color: var(--amber); color: var(--amber); }
    .modal-btn.close { padding: 8px 14px; }

    .modal-body {
      flex: 1; overflow: auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
    }
    .modal-preview {
      background: var(--ink-soft);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      overflow: auto;
    }
    .modal-preview img, .modal-preview video {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-preview iframe {
      width: 100%; max-width: 1200px;
      aspect-ratio: 16/9;
      border: none; background: #000;
    }
    .modal-preview .pdf-pages {
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 900px;
    }
    .modal-preview .pdf-pages canvas {
      width: 100%; height: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .modal-preview-empty {
      text-align: center; color: var(--muted-light);
    }
    .modal-preview-empty .mark {
      font-family: var(--serif); font-size: 80px; font-style: italic;
      color: var(--musk); margin-bottom: 16px;
    }

    .modal-info {
      background: var(--ink);
      color: var(--cream);
      padding: 36px;
      overflow-y: auto;
      border-left: 1px solid var(--ink-line);
    }
    .info-section { margin-bottom: 28px; }
    .info-section:last-child { margin-bottom: 0; }
    .info-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted-light); font-weight: 500;
      margin-bottom: 8px;
    }
    .info-value {
      font-size: 14px; line-height: 1.6;
      color: var(--cream);
      white-space: pre-wrap; word-break: break-word;
    }
    .info-value a { color: var(--amber); text-decoration: none; border-bottom: 1px solid rgba(212,162,76,0.3); }
    .info-value a:hover { border-bottom-color: var(--amber); }
    .info-value.serif {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.3;
    }

    /* ============ Forms / Editor Modal ============ */
    .form-modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.7);
      z-index: 9600;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    .form-frame {
      background: var(--paper);
      width: 100%; max-width: 640px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      border: 1px solid var(--ink-line);
      position: relative;
    }
    .form-header {
      padding: 28px 36px 20px;
      border-bottom: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .form-header h3 {
      font-family: var(--serif);
      font-size: 26px; font-weight: 500;
      color: var(--ink);
    }
    .form-close {
      background: none; border: none;
      font-size: 24px; color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .form-close:hover { color: var(--ink); }
    .form-body {
      padding: 28px 36px;
      overflow-y: auto;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      margin-bottom: 8px;
    }
    .field label .required { color: var(--rose); }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--cream);
      border: 1px solid rgba(14,21,37,0.12);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--ink);
    }
    .field textarea {
      min-height: 90px; resize: vertical;
      font-family: inherit;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .file-drop {
      border: 1px dashed rgba(14,21,37,0.2);
      padding: 24px; text-align: center;
      background: var(--cream);
      transition: border-color .2s, background .2s;
    }
    .file-drop:hover { border-color: var(--ink); background: var(--paper); }
    .file-drop.dragging { border-color: var(--amber); background: rgba(212,162,76,0.05); }
    .file-drop .mark {

function isVideoFile(name) { return /\.(mp4|webm|mov|m4v)$/i.test(name||''); }

function fmtDate(ts) {

              path: path,

/* PDF Viewer */
function PdfPreview({ url }) {
  const containerRef = useRef(null);
  const [error, setError] = useState(null);
  useEffect(() => {
    let cancelled = false;
    const container = containerRef.current;
    if (!container || !window.pdfjsLib) return;
    container.innerHTML = '';
    setError(null);
    (async () => {
      try {
        const pdf = await window.pdfjsLib.getDocument({ url, withCredentials: false }).promise;
        if (cancelled) return;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          if (cancelled) return;
          container.appendChild(canvas);
        }
      } catch(e) {
        console.error(e);
        if (!cancelled) setError('PDF를 불러올 수 없습니다.');
      }
    })();
    return () => { cancelled = true; };
  }, [url]);
  if (error) return <div className="modal-preview-empty"><p>{error}</p></div>;
  return <div className="pdf-pages" ref={containerRef}></div>;
}

/* Preview Modal */
function PreviewModal({ item, sectionKey, onClose, onEdit, isFav, onToggleFav, editMode }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  if (!item) return null;
  const fields = SECTION_FIELDS[sectionKey] || [];
  const sectionMeta = getSectionMeta(sectionKey);
  const files = item.files || [];
  const ytId = getYouTubeId(item.videoUrl);
  const imageFiles = files.filter(f => isImageFile(f.name));
  const videoFiles = files.filter(f => isVideoFile(f.name));
  const pdfFiles = files.filter(f => isPdfFile(f.name));
  const otherFiles = files.filter(f => !isImageFile(f.name) && !isVideoFile(f.name) && !isPdfFile(f.name));

  // Choose primary preview
  let preview = null;
  if (ytId) {
    preview = <iframe src={`https://www.youtube.com/embed/${ytId}?autoplay=0&rel=0`} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen />;
  } else if (videoFiles.length > 0) {
    preview = <video src={videoFiles[0].directUrl} controls />;
  } else if (pdfFiles.length > 0) {
    preview = <PdfPreview url={pdfFiles[0].directUrl} />;
  } else if (imageFiles.length > 0) {
    preview = <img src={imageFiles[0].directUrl} alt="" />;
  } else if (item.videoUrl && /\.(mp4|webm|mov)/i.test(item.videoUrl)) {
    preview = <video src={item.videoUrl} controls />;
  } else {
    preview = (
      <div className="modal-preview-empty">
        <div className="mark">{(item.title || '?').slice(0,1)}</div>
        <p>표시할 미디어가 없습니다.</p>
      </div>
    );
  }

  return (
    <div className="modal" onClick={onClose}>
      <div className="modal-header" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-title-block">
          <div className="modal-eyebrow">{sectionMeta.name}</div>
          <div className="modal-title">{item.title || '제목 없음'}</div>

            {isFav ? '★ 즐겨찾기' : '☆ 즐겨찾기'}

          {editMode && (
            <button className="modal-btn" onClick={() => onEdit(item)}>편집</button>

        </div>

      <div className="modal-body" onClick={(e)=>e.stopPropagation()}>
        <div className="modal-preview">{preview}</div>
        <div className="modal-info">
          {item.desc && (
            <div className="info-section">
              <div className="info-label">설명</div>
              <div className="info-value serif">{item.desc}</div>
            </div>
          )}
          {fields.filter(f => !f.isTitle && f.key !== 'desc').map(f => {
            const v = item[f.key];
            if (!v) return null;
            return (
              <div className="info-section" key={f.key}>
                <div className="info-label">{f.label}</div>
                <div className="info-value">
                  {f.key.includes('url') || f.key.includes('Url')
                    ? <a href={v} target="_blank" rel="noopener noreferrer">{v}</a>
                    : v}
                </div>
              </div>
            );

          {(imageFiles.length > 1 || videoFiles.length > 1 || pdfFiles.length > 1 || otherFiles.length > 0) && (
            <div className="info-section">
              <div className="info-label">첨부 파일 ({files.length})</div>

                    <a href={f.directUrl} target="_blank" rel="noopener noreferrer">{f.name}</a>

                ))}
              </div>
            </div>
          )}
          {item.updatedAt && (
            <div className="info-section">
              <div className="info-label">최종 수정</div>
              <div className="info-value">{fmtDate(item.updatedAt)}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


/* Edit Form Modal */
function EditModal({ item, sectionKey, subCategories, onClose, onSave, onSubCatAdd }) {
  const isNew = !item || !item.id;
  const fields = SECTION_FIELDS[sectionKey] || [];
  const [form, setForm] = useState(() => {
    const f = {};
    fields.forEach(field => { f[field.key] = (item && item[field.key]) || ''; });
    f.subId = (item && item.subId) || (subCategories[0] && subCategories[0].id) || '';
    f.files = (item && item.files) ? [...item.files] : [];
    return f;
  });
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  function setField(key, val) { setForm(prev => ({ ...prev, [key]: val })); }

  async function handleFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    setProgress(0);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const f = filesArr[i];
        const result = await Store.uploadFile(f, p => setProgress(p));
        newFiles.push(result);
      }
      setForm(prev => ({ ...prev, files: [...(prev.files||[]), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
      setProgress(0);
    }
  }

  function removeFile(fileId) {
    setForm(prev => ({ ...prev, files: prev.files.filter(f => f.id !== fileId) }));
  }

  function submit() {
    const titleField = fields.find(f => f.isTitle);
    if (titleField && !form[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({
      ...item,
      ...form,
      id: item && item.id ? item.id : uid(),
      updatedAt: Date.now()
    });
  }

  const titleField = fields.find(f => f.isTitle) || fields[0];

  return (
    <div className="form-modal" onClick={onClose}>
      <div className="form-frame" onClick={(e)=>e.stopPropagation()}>
        <div className="form-header">
          <h3>{isNew ? '새 자료 등록' : '자료 편집'}</h3>
          <button className="form-close" onClick={onClose}>×</button>
        </div>
        <div className="form-body">
          {/* Sub category selector */}
          {subCategories.length > 0 && (
            <div className="field">
              <label>분류</label>
              <select value={form.subId} onChange={e => setField('subId', e.target.value)}>
                {subCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
          )}

          {fields.map(f => (
            <div className="field" key={f.key}>
              <label>{f.label} {f.required && <span className="required">*</span>}</label>
              {f.type === 'textarea' ? (
                <textarea
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              ) : f.type === 'select' ? (
                <select value={form[f.key] || ''} onChange={e => setField(f.key, e.target.value)}>
                  <option value="">선택</option>
                  {(f.options||[]).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
              ) : (
                <input
                  type={f.type === 'date' ? 'date' : 'text'}
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              )}
            </div>
          ))}

          {/* Files */}
          <div className="field">
            <label>첨부 파일 (이미지 / PDF / 영상)</label>
            <div
              className={'file-drop ' + (dragging ? 'dragging' : '')}
              onDragOver={(e)=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={(e)=>{
                e.preventDefault();
                setDragging(false);
                handleFiles(e.dataTransfer.files);
              }}
            >
              <div className="mark">+</div>
              <p>파일을 끌어다 놓거나 버튼으로 선택하세요</p>
              <button onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={uploading}>
                {uploading ? `업로드 ${Math.round(progress*100)}%` : '파일 선택'}
              </button>
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{display:'none'}}
                onChange={(e)=>handleFiles(e.target.files)}
              />
            </div>
            {form.files && form.files.length > 0 && (
              <div className="file-list">
                {form.files.map(f => (
                  <div className="file-row" key={f.id}>
                    <span className="name">{f.name}</span>
                    <button onClick={()=>removeFile(f.id)} title="삭제">×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="form-foot">
          <div className="left">
            {subCategories.length === 0 && (
              <button className="btn ghost" onClick={onSubCatAdd}>+ 분류 추가</button>
            )}
          </div>
          <div className="right">
            <button className="btn ghost" onClick={onClose}>취소</button>
            <button className="btn amber" onClick={submit} disabled={uploading}>
              {isNew ? '등록' : '저장'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* Confirm dialog */
function Confirm({ title, text, onConfirm, onCancel, danger }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={(e)=>e.stopPropagation()}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-text">{text}</div>
        <div className="confirm-actions">
          <button className="btn ghost" onClick={onCancel}>취소</button>
          <button className={'btn ' + (danger ? '' : 'amber')} onClick={onConfirm}>
            {danger ? '삭제' : '확인'}
          </button>
        </div>
      </div>
    </div>
  );
}


/* ============ Main App ============ */
function App() {
  const [data, setData] = useState(null);
  const [activeSection, setActiveSection] = useState('curriculum');
  const [activeSub, setActiveSub] = useState('all');
  const [search, setSearch] = useState('');
  const [previewItem, setPreviewItem] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [editMode, setEditMode] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [user, setUser] = useState(fbAuth.currentUser);

  // Auth listener
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(u => setUser(u));
    return unsub;
  }, []);

  // Load data
  useEffect(() => {
    Store.load().then(d => setData(d)).catch(e => {
      alert('데이터 로드 실패: ' + (e.message || e));
      setData(Store.defaultData());
    });
  }, []);

  // Save helper
  const persist = useCallback(async (next) => {
    setData(next);
    await Store.save(next);
  }, []);

  // Derived: current section data + filtered items
  const currentSection = useMemo(() => getSectionMeta(activeSection), [activeSection]);
  const isFavView = activeSection === 'favorites';

  const allItems = useMemo(() => {
    if (!data) return [];
    if (isFavView) {
      const favIds = data.favorites || [];
      const all = [];
      Object.keys(data.sectionData).forEach(sk => {
        (data.sectionData[sk].items || []).forEach(it => {
          if (favIds.includes(it.id)) all.push({ ...it, _section: sk });
        });
      });
      return all;
    }
    const sec = data.sectionData[activeSection];
    if (!sec) return [];
    return (sec.items || []).map(it => ({ ...it, _section: activeSection }));
  }, [data, activeSection, isFavView]);

  const subCategories = useMemo(() => {
    if (!data || isFavView) return [];
    const sec = data.sectionData[activeSection];
    return sec ? (sec.subCategories || []) : [];
  }, [data, activeSection, isFavView]);

  const filteredItems = useMemo(() => {
    let items = allItems;
    if (!isFavView && activeSub !== 'all') {
      items = items.filter(it => String(it.subId) === String(activeSub));
    }
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      items = items.filter(it => {
        const haystack = [it.title, it.desc, it.author, it.speaker, it.specialty, it.career, it.location, it.source]
          .filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    return items;
  }, [allItems, activeSub, search, isFavView]);

  const sectionCounts = useMemo(() => {
    const counts = {};
    if (!data) return counts;
    SECTIONS.forEach(s => {
      if (s.special) {
        counts[s.key] = (data.favorites || []).length;
      } else {
        counts[s.key] = ((data.sectionData[s.key] || {}).items || []).length;
      }
    });
    return counts;
  }, [data]);

  // Reset sub when section changes
  useEffect(() => { setActiveSub('all'); }, [activeSection]);

  // ============ Actions ============
  function selectSection(key) {
    setActiveSection(key);
    setSidebarOpen(false);
  }

  async function toggleFav(item) {
    const favs = new Set(data.favorites || []);
    if (favs.has(item.id)) favs.delete(item.id);
    else favs.add(item.id);
    await persist({ ...data, favorites: Array.from(favs) });
  }

  async function saveItem(item) {
    const sectionKey = (editingItem && editingItem._section) || activeSection;
    if (sectionKey === 'favorites') return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[sectionKey];
    sec.items = sec.items || [];
    const idx = sec.items.findIndex(x => String(x.id) === String(item.id));
    if (idx >= 0) sec.items[idx] = item;
    else sec.items.push(item);
    setEditingItem(null);
    await persist(next);
  }

  async function deleteItem(item) {
    const sectionKey = item._section || activeSection;
    setConfirm({
      title: '자료 삭제',
      text: `"${item.title}"을(를) 삭제하시겠습니까? 첨부 파일도 함께 삭제됩니다.`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const next = JSON.parse(JSON.stringify(data));
        const sec = next.sectionData[sectionKey];
        const removed = (sec.items || []).find(x => String(x.id) === String(item.id));
        sec.items = (sec.items || []).filter(x => String(x.id) !== String(item.id));
        next.favorites = (next.favorites || []).filter(id => id !== item.id);
        // delete files in background
        if (removed && removed.files) removed.files.forEach(f => Store.deleteFile(f));
        await persist(next);
      }
    });
  }

  async function addSubCategory() {
    const name = prompt('새 분류 이름');
    if (!name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories || [];
    sec.subCategories.push({ id: uid(), name: name.trim() });
    await persist(next);
  }

  async function renameSubCategory(sub) {
    const name = prompt('분류 이름 수정', sub.name);
    if (!name || name === sub.name) return;
    const next = JSON.parse(JSON.stringify(data));
    const sec = next.sectionData[activeSection];
    sec.subCategories = sec.subCategories.map(s =>
      String(s.id) === String(sub.id) ? { ...s, name: name.trim() } : s
    );
    await persist(next);
  }

  async function deleteSubCategory(sub) {
    setConfirm({
      title: '분류 삭제',
      text: `"${sub.name}" 분류와 그 안의 모든 자료를 삭제하시겠습니까?`,
      danger: true,
      onConfirm: async () => {
        setConfirm(null);
        const next = JSON.parse(JSON.stringify(data));
        const sec = next.sectionData[activeSection];
        const itemsToRemove = (sec.items || []).filter(x => String(x.subId) === String(sub.id));
        itemsToRemove.forEach(it => (it.files || []).forEach(f => Store.deleteFile(f)));
        const removeIds = new Set(itemsToRemove.map(x => x.id));
        sec.items = (sec.items || []).filter(x => !removeIds.has(x.id));
        sec.subCategories = (sec.subCategories || []).filter(s => String(s.id) !== String(sub.id));
        next.favorites = (next.favorites || []).filter(id => !removeIds.has(id));
        await persist(next);
      }
    });
  }

  function openNew() {
    if (isFavView) {
      alert('새 자료는 각 섹션에서 등록해 주세요.');
      return;
    }
    if (subCategories.length === 0) {
      // auto-create default sub
      addSubCategory().then(() => {
        setEditingItem({ _section: activeSection });
      });
      return;
    }
    setEditingItem({ _section: activeSection });
  }

  // ============ Render ============
  if (!data) {
    return (
      <div style={{padding:80,textAlign:'center',color:'var(--muted)'}}>
        <div className="loading-bar" style={{margin:'0 auto'}}></div>
        <p style={{marginTop:20}}>데이터 불러오는 중…</p>
      </div>
    );
  }

  const isFav = (id) => (data.favorites || []).includes(id);

  return (
    <>
      <button className="mobile-toggle" onClick={()=>setSidebarOpen(true)} aria-label="메뉴">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div className={'sidebar-overlay ' + (sidebarOpen ? 'open' : '')} onClick={()=>setSidebarOpen(false)}></div>

      <div className="app">
        {/* SIDEBAR */}
        <aside className={'sidebar ' + (sidebarOpen ? 'open' : '')}>
          <div className="brand">
            <div className="brand-mark">SBS<span className="amp"> · </span><em>Academy</em></div>
            <div className="brand-sub">Consultation Library</div>
          </div>

          <div className="search-box">
            <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <input
              type="text"
              placeholder="검색…"
              value={search}
              onChange={(e)=>setSearch(e.target.value)}
            />
          </div>

          <div className="nav-label">Sections</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => !s.special).map(s => (
              <li key={s.key}
                  className={'nav-item ' + (activeSection === s.key ? 'active' : '')}
                  onClick={()=>selectSection(s.key)}>
                <span className="nav-name">{s.name}</span>
                <span className="nav-count">{sectionCounts[s.key] || 0}</span>
              </li>
            ))}
          </ul>

          <div className="nav-label">Pinned</div>
          <ul className="nav-list">
            {SECTIONS.filter(s => s.special).map(s => (
              <li key={s.key}
                  className={'nav-item ' + (activeSection === s.key ? 'active' : '')}
                  onClick={()=>selectSection(s.key)}>
                <span className="nav-name">★ {s.name}</span>
                <span className="nav-count">{sectionCounts[s.key] || 0}</span>
              </li>
            ))}
          </ul>

          <div className="sidebar-footer">
            <span className="user-email">{user ? user.email : ''}</span>
            <div className="sidebar-actions">
              <button className="sidebar-btn" onClick={()=>setEditMode(v => !v)}>
                {editMode ? '잠금' : '편집'}
              </button>
              <button className="sidebar-btn danger" onClick={()=>fbAuth.signOut()}>로그아웃</button>
            </div>
          </div>
        </aside>

        {/* MAIN */}
        <main className="main">
          <header className="main-header">
            <div className="header-text">
              <div className="header-eyebrow">
                {isFavView ? 'Pinned Materials' : 'Section ' + (SECTIONS.findIndex(s=>s.key===activeSection)+1).toString().padStart(2,'0')}
              </div>
              <h1 className="header-title">
                {isFavView ? <em>즐겨찾기</em> : <>{currentSection.name}</>}
              </h1>
              <div className="header-meta">
                <span>{currentSection.sub || '자주 보여주는 자료 모음'}</span>
                <span className="dot"></span>
                <span>{filteredItems.length}건</span>
              </div>
            </div>
            <div className="header-actions">
              {!isFavView && editMode && (
                <button className="btn amber" onClick={openNew}>+ 새 자료</button>
              )}
            </div>
          </header>

          {/* Sub-categories */}
          {!isFavView && (
            <div className="subcat-bar">
              <button
                className={'subcat-chip ' + (activeSub === 'all' ? 'active' : '')}
                onClick={()=>setActiveSub('all')}
              >
                전체 <span className="chip-count">({allItems.length})</span>
              </button>
              {subCategories.map(sub => {
                const c = allItems.filter(it => String(it.subId) === String(sub.id)).length;
                return (
                  <button key={sub.id}
                          className={'subcat-chip ' + (String(activeSub) === String(sub.id) ? 'active' : '')}
                          onClick={()=>setActiveSub(sub.id)}
                          onContextMenu={(e)=>{
                            if (!editMode) return;
                            e.preventDefault();
                            const action = prompt('1: 이름 변경 / 2: 삭제', '1');
                            if (action === '1') renameSubCategory(sub);
                            else if (action === '2') deleteSubCategory(sub);
                          }}>
                    {sub.name} <span className="chip-count">({c})</span>
                  </button>
                );
              })}
              {editMode && (
                <button className="subcat-add" onClick={addSubCategory}>+ 분류 추가</button>
              )}
            </div>
          )}

          {/* Grid */}
          <div className="grid-wrap">
            {filteredItems.length === 0 ? (
              <div className="empty">
                <div className="empty-mark">∅</div>
                <div className="empty-title">자료가 없습니다</div>
                <div className="empty-text">
                  {search ? '검색 조건과 일치하는 자료가 없습니다.' :
                    isFavView ? '카드의 별 아이콘을 눌러 즐겨찾기에 추가하세요.' :
                    editMode ? '+ 새 자료 버튼으로 등록하세요.' : '편집 모드에서 자료를 등록할 수 있습니다.'}
                </div>
              </div>
            ) : (
              <div className="grid">
                {filteredItems.map(item => {
                  const sectionKey = item._section || activeSection;
                  const subs = data.sectionData[sectionKey] ? data.sectionData[sectionKey].subCategories : [];
                  const sub = subs.find(s => String(s.id) === String(item.subId));
                  return (
                    <Card
                      key={item.id}
                      item={item}
                      sectionKey={sectionKey}
                      subCatName={sub ? sub.name : null}
                      onOpen={(it)=>setPreviewItem(it)}
                      onToggleFav={toggleFav}
                      isFav={isFav(item.id)}
                      onEdit={(it)=>setEditingItem(it)}
                      onDelete={(it)=>deleteItem(it)}
                      editMode={editMode}
                    />
                  );
                })}
              </div>
            )}
          </div>
        </main>
      </div>

      {/* Preview */}
      {previewItem && (
        <PreviewModal
          item={previewItem}
          sectionKey={previewItem._section || activeSection}
          onClose={()=>setPreviewItem(null)}
          onEdit={(it)=>{ setEditingItem(it); setPreviewItem(null); }}
          onToggleFav={toggleFav}
          isFav={isFav(previewItem.id)}
          editMode={editMode}
        />
      )}

      {/* Edit */}
      {editingItem && (
        <EditModal
          item={editingItem}
          sectionKey={editingItem._section || activeSection}
          subCategories={subCategories}
          onClose={()=>setEditingItem(null)}
          onSave={saveItem}
          onSubCatAdd={addSubCategory}
        />
      )}

      {/* Confirm */}
      {confirm && (
        <Confirm
          title={confirm.title}
          text={confirm.text}
          danger={confirm.danger}
          onConfirm={confirm.onConfirm}
          onCancel={()=>setConfirm(null)}
        />
      )}
    </>
  );
}

/* ============ Bootstrap ============ */
const loadingEl = document.getElementById('loading');
const loginScreen = document.getElementById('login-screen');
const loginEmail = document.getElementById('login-email');
const loginPass = document.getElementById('login-password');
const loginBtn = document.getElementById('login-submit');
const loginErr = document.getElementById('login-error');

let appRendered = false;

function setLoginLoading(b) {
  loginBtn.disabled = b;
  loginBtn.textContent = b ? '로그인 중…' : '로그인';
}

async function attemptLogin() {
  const email = loginEmail.value.trim();
  const pass = loginPass.value;
  if (!email || !pass) {
    loginErr.textContent = '이메일과 비밀번호를 입력하세요.';
    return;
  }
  loginErr.textContent = '';
  setLoginLoading(true);
  try {
    await fbAuth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    const msg = (e.code || '').includes('user-not-found') ? '등록되지 않은 이메일입니다.' :
                (e.code || '').includes('wrong-password') ? '비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('invalid-credential') ? '이메일 또는 비밀번호가 올바르지 않습니다.' :
                (e.code || '').includes('too-many-requests') ? '시도가 너무 많습니다. 잠시 후 다시 시도하세요.' :
                (e.message || '로그인 실패');
    loginErr.textContent = msg;
    setLoginLoading(false);
  }
}

loginBtn.addEventListener('click', attemptLogin);
[loginEmail, loginPass].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
});

fbAuth.onAuthStateChanged(user => {
  if (user) {
    loginScreen.classList.add('hidden');
    if (!appRendered) {
      appRendered = true;
      ReactDOM.render(React.createElement(App), document.getElementById('root'));
      setTimeout(() => loadingEl.classList.add('hidden'), 100);
    }
  } else {
    loadingEl.classList.add('hidden');
    loginScreen.classList.remove('hidden');
    setLoginLoading(false);
    setTimeout(() => loginEmail.focus(), 100);
  }
});

})();
</script>
