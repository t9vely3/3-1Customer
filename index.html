/* PDF 첫 페이지 → 썸네일 (세션 캐시) */
const __pdfThumbCache = {};
function usePdfThumb(url) {
  const [src, setSrc] = useState(url ? (__pdfThumbCache[url] || null) : null);
  useEffect(() => {
    if (!url) { setSrc(null); return; }
    if (__pdfThumbCache[url]) { setSrc(__pdfThumbCache[url]); return; }
    if (!window.pdfjsLib) return;
    let dead = false;
    (async () => {
      try {
        const pdf = await pdfjsLib.getDocument({ url }).promise;
        const page = await pdf.getPage(1);
        const vp1 = page.getViewport({ scale: 1 });
        const scale = Math.min(2, 560 / vp1.width);
        const vp = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        __pdfThumbCache[url] = dataUrl;
        if (!dead) setSrc(dataUrl);
        try { pdf.destroy(); } catch(e) {}
      } catch(e) { /* CORS·손상 파일 등 — 타일 유지 */ }
    })();
    return () => { dead = true; };
  }, [url]);
  return src;
}
/* 링크 메타데이터 가져오기 — 저장 시 1회만 호출해 아이템에 캐시.
   순서: YouTube 직행 → microlink → allorigins → corsproxy → 스크린샷 폴백.
   어떤 경우에도 도메인/스크린샷으로 최소한의 미리보기를 보장. */
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(t));
}
function parseOgFromHtml(html, baseUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const og = (p) => {
    const el = doc.querySelector(`meta[property="og:${p}"], meta[name="og:${p}"], meta[name="twitter:${p}"]`);
    return el ? (el.getAttribute('content') || '') : '';
  };
  const title = og('title') || (doc.querySelector('title') ? doc.querySelector('title').textContent.trim() : '');
  const desc = og('description') || (doc.querySelector('meta[name="description"]') ? (doc.querySelector('meta[name="description"]').getAttribute('content') || '') : '');
  let img = og('image');
  if (img && !/^https?:\/\//i.test(img)) { try { img = new URL(img, baseUrl).href; } catch(e) { img = ''; } }
  return { title, desc, img };
}
async function fetchLinkPreview(url) {
  const domain = getDomain(url);
  const out = { linkUrl: url, linkTitle: '', linkDesc: '', linkImage: '', linkDomain: domain };
  // 1) YouTube 영상: 썸네일 직행 + oEmbed 제목
  const ytId = getYouTubeId(url);
  if (ytId) {
    out.linkImage = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
    try {
      const r = await fetchWithTimeout(`https://noembed.com/embed?url=${encodeURIComponent(url)}`, 6000);
      if (r.ok) { const j = await r.json(); if (j.title) out.linkTitle = j.title; }
    } catch(e) {}
    if (!out.linkTitle) out.linkTitle = 'YouTube 영상';
    return out;
  }
  // 2) microlink — OG 메타 (CORS 지원)
  try {
    const r = await fetchWithTimeout(`https://api.microlink.io/?url=${encodeURIComponent(url)}`, 8000);
    if (r.ok) {
      const j = await r.json();
      if (j.status === 'success' && j.data) {
        out.linkTitle = j.data.title || '';
        out.linkDesc = j.data.description || '';
        out.linkImage = (j.data.image && j.data.image.url) || (j.data.logo && j.data.logo.url) || '';
      }
    }
  } catch(e) {}
  // 3) allorigins 프록시로 HTML 직접 파싱
  if (!out.linkTitle || !out.linkImage) {
    try {
      const r = await fetchWithTimeout(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, 8000);
      if (r.ok) {
        const j = await r.json();
        const p = parseOgFromHtml(j.contents || '', url);
        if (!out.linkTitle) out.linkTitle = p.title;
        if (!out.linkDesc) out.linkDesc = p.desc;
        if (!out.linkImage) out.linkImage = p.img;
      }
    } catch(e) {}
  }
  // 4) corsproxy.io 폴백
  if (!out.linkTitle || !out.linkImage) {
    try {
      const r = await fetchWithTimeout(`https://corsproxy.io/?url=${encodeURIComponent(url)}`, 8000);
      if (r.ok) {
        const html = await r.text();
        const p = parseOgFromHtml(html, url);
        if (!out.linkTitle) out.linkTitle = p.title;
        if (!out.linkDesc) out.linkDesc = p.desc;
        if (!out.linkImage) out.linkImage = p.img;
      }
    } catch(e) {}
  }
  // 5) 최종 보장: 이미지 없으면 페이지 스크린샷, 제목 없으면 도메인
  if (!out.linkImage) {
    out.linkImage = `https://s0.wp.com/mshots/v1/${encodeURIComponent(url)}?w=800`;
  }
  if (!out.linkTitle) out.linkTitle = domain || url;
  return out;
}

/* ============ Data Layer (Split-Document Model) ============
   - meta/main : structure (sections, subCategories with subSubCategories), home content, favorites
   - items/{itemId} : one document per data item (title, body, files, ...)
   This avoids the 1MB-per-document Firestore limit.
================================================================= */
const Store = {
  defaultHome() {
    return {
      eyebrow: 'Consultation Library',
      titleLine1: '창의적인 시작,',
      titleLine2: '완성으로 가는 길',
      titleEm: '완성으로 가는 길',
      tagline: '영상 · 디자인 · 게임 · AI 분야의 모든 자료를 한 곳에.\n상담실 전용 큐레이션 라이브러리.',
      meta: 'EST. AIX Academy · Computer Art'
    };
  },
  // In-memory shape used by the React app — same as before so UI doesn't change.
  defaultData() {
    const sd = {};
    SECTIONS.forEach(s => { if (!s.special) sd[s.key] = { subCategories: [], items: [] }; });
    return { sectionData: sd, favorites: [], homeContent: this.defaultHome(), settings: {} };
  },
  ensureShape(d) {
    d = d || this.defaultData();
    d.sectionData = d.sectionData || {};
    SECTIONS.forEach(s => {
      if (s.special) return;
      if (!d.sectionData[s.key]) d.sectionData[s.key] = { subCategories: [], items: [] };
      d.sectionData[s.key].subCategories = d.sectionData[s.key].subCategories || [];
      // Strip _section from items in storage shape (it's a transient nav field)
      d.sectionData[s.key].items = (d.sectionData[s.key].items || []).map(it => {
        if (!it) return it;
        const { _section, ...rest } = it;
        return rest;
      });
    });
    d.favorites = d.favorites || [];
    d.homeContent = Object.assign(this.defaultHome(), d.homeContent || {});
    d.settings = d.settings || {};
    return d;
  },

  // ===== LOAD =====
  // Strategy:
  // 1) Try meta/main + items/* (new model)
  // 2) If meta doesn't exist BUT legacy app/main does → MIGRATE
  // 3) Otherwise → empty defaults
  async load() {
    const user = fbAuth.currentUser && fbAuth.currentUser.email;
    console.log('[STORE] load: starting, user=', user);
    try {
      const metaSnap = await META_REF.get();
      if (metaSnap.exists) {
        // New model
        const meta = metaSnap.data();
        const itemsSnap = await ITEMS_COL.get();
        const itemsBySection = {};
        itemsSnap.forEach(doc => {
          const it = doc.data();
          const sk = it._section;
          if (!sk) return;
          if (!itemsBySection[sk]) itemsBySection[sk] = [];
          // Strip internal fields when returning
          const { _section, ...rest } = it;
          rest._section = sk; // keep _section for app-side use
          itemsBySection[sk].push(rest);
        });
        const d = this.ensureShape({
          sectionData: this._buildSectionData(meta.sectionData || {}, itemsBySection),
          favorites: meta.favorites || [],
          homeContent: meta.homeContent || this.defaultHome(),
          settings: meta.settings || {}
        });
        d._docUpdatedAt = meta._docUpdatedAt || 0;
        const totalItems = Object.values(itemsBySection).reduce((a,b)=>a+b.length,0);
        console.log('[STORE] load: NEW MODEL success, items=', totalItems, 'updatedAt=', d._docUpdatedAt);
        return d;
      }

      // Meta doesn't exist — try migration from legacy
      console.log('[STORE] load: no meta doc, checking legacy...');
      const legacySnap = await DOC_REF.get();
      if (legacySnap.exists) {
        console.log('[STORE] load: legacy doc found, MIGRATING...');
        const legacyData = legacySnap.data();
        await this._migrateFromLegacy(legacyData);
        // After migration, load fresh from new model
        return this.load();
      }

      console.log('[STORE] load: no data anywhere, using defaults');
      const empty = this.defaultData();
      empty._docUpdatedAt = 0;
      return empty;
    } catch(e) {
      console.error('[STORE] load FAILED', e, 'code=', e.code, 'message=', e.message);
      throw e;
    }
  },

  // Combine meta sectionData (no items) with itemsBySection
  _buildSectionData(metaSectionData, itemsBySection) {
    const out = {};
    SECTIONS.forEach(s => {
      if (s.special) return;
      const meta = metaSectionData[s.key] || {};
      // Strip _section from each item
      const cleanItems = (itemsBySection[s.key] || []).map(it => {
        const { _section, ...rest } = it;
        return rest;
      });
      out[s.key] = {
        subCategories: meta.subCategories || [],
        items: cleanItems
      };
    });
    return out;
  },

  // Strip items out of sectionData → only structure (small, well under 1MB)
  _stripItemsFromSectionData(sectionData) {
    const out = {};
    Object.keys(sectionData || {}).forEach(k => {
      out[k] = {
        subCategories: sectionData[k].subCategories || []
      };
    });
    return out;
  },

  // ===== MIGRATION =====
  // Move legacy app/main → meta/main + items/*
  async _migrateFromLegacy(legacyData) {
    console.log('[MIGRATE] starting...');
    const sectionData = legacyData.sectionData || {};
    const allItems = [];
    Object.keys(sectionData).forEach(sk => {
      (sectionData[sk].items || []).forEach(it => {
        allItems.push({ ...it, _section: sk });
      });
    });
    console.log('[MIGRATE] writing', allItems.length, 'items to items collection...');

    // Use batched writes (max 500 ops per batch)
    const CHUNK = 400;
    for (let i = 0; i < allItems.length; i += CHUNK) {
      const batch = fbDb.batch();
      const slice = allItems.slice(i, i + CHUNK);
      slice.forEach(it => {
        const id = String(it.id || uid());
        batch.set(ITEMS_COL.doc(id), { ...it, id });
      });
      await batch.commit();
      console.log('[MIGRATE] batch', Math.floor(i/CHUNK)+1, 'committed (' + slice.length + ' items)');
    }

    // Write meta doc
    const meta = {
      sectionData: this._stripItemsFromSectionData(sectionData),
      favorites: legacyData.favorites || [],
      homeContent: legacyData.homeContent || this.defaultHome(),
      settings: legacyData.settings || {},
      _docUpdatedAt: Date.now()
    };
    await META_REF.set(meta);
    console.log('[MIGRATE] meta doc written. Migration complete.');
    // Note: legacy doc is NOT deleted — it remains as a backup.
  },

  // ===== SAVE =====
  // The app passes a "data" snapshot in the same shape as defaultData().
  // We diff it against the previous and write only what's needed.
  // For simplicity here, we write meta + all items that exist in `data`.
  // Items that no longer exist in data but do in Firestore are removed.
  async save(data, expectedUpdatedAt) {
    const allItems = [];
    Object.keys(data.sectionData || {}).forEach(sk => {
      (data.sectionData[sk].items || []).forEach(it => {
        allItems.push({ ...it, _section: sk });
      });
    });
    console.log('[STORE] save: starting, items=', allItems.length, 'expectedUpdatedAt=', expectedUpdatedAt, 'user=', fbAuth.currentUser && fbAuth.currentUser.email);
    if (!fbAuth.currentUser) {
      console.error('[STORE] save BLOCKED: not authenticated');
      alert('로그인이 만료되었습니다. 페이지를 새로고침하고 다시 로그인해 주세요.\n(작성 중인 내용을 잃지 않기 위해 새로고침 전에 텍스트를 복사해 두세요.)');
      throw new Error('NOT_AUTHENTICATED');
    }
    try {
      // Concurrency check
      const metaSnap = await META_REF.get();
      if (metaSnap.exists) {
        const serverUpdatedAt = (metaSnap.data() && metaSnap.data()._docUpdatedAt) || 0;
        console.log('[STORE] save: serverUpdatedAt=', serverUpdatedAt);
        if (expectedUpdatedAt !== undefined && expectedUpdatedAt !== null && serverUpdatedAt > expectedUpdatedAt) {
          console.warn('[STORE] save: CONFLICT detected');
          const err = new Error('CONFLICT');
          err.code = 'conflict';
          err.serverUpdatedAt = serverUpdatedAt;
          throw err;
        }
      }

      const newUpdatedAt = Date.now();
      // 1) Write meta doc
      const meta = {
        sectionData: this._stripItemsFromSectionData(data.sectionData || {}),
        favorites: data.favorites || [],
        homeContent: data.homeContent || this.defaultHome(),
        settings: data.settings || {},
        _docUpdatedAt: newUpdatedAt
      };
      const metaSize = new Blob([JSON.stringify(meta)]).size;
      console.log('[STORE] save: meta size=', (metaSize/1024).toFixed(1), 'KB');
      if (metaSize > 900 * 1024) {
        console.warn('[STORE] save: meta approaching 1MB! (too many subcategories?)');
      }
      await META_REF.set(meta);

      // 2) Determine which items to upsert and which to delete
      const existingItemsSnap = await ITEMS_COL.get();
      const currentIds = new Set(allItems.map(it => String(it.id)));

      // Upsert each item; skip items that haven't changed (compare against existing)
      const existingById = {};
      existingItemsSnap.forEach(d => { existingById[d.id] = d.data(); });

      // Per-item size check — only single-item 1MB matters here (rare)
      const oversizeItems = [];
      const itemsToWrite = [];
      for (const it of allItems) {
        const id = String(it.id);
        const newDoc = { ...it, id };
        // Compare with existing (if same, skip)
        const existingDoc = existingById[id];
        if (existingDoc && JSON.stringify(existingDoc) === JSON.stringify(newDoc)) {
          continue; // unchanged, no write needed
        }
        const itemSize = new Blob([JSON.stringify(newDoc)]).size;
        if (itemSize > 1000 * 1024) {
          oversizeItems.push({ id, title: it.title, sizeKB: (itemSize/1024).toFixed(1) });
          continue;
        }
        itemsToWrite.push(newDoc);
      }

      if (oversizeItems.length > 0) {
        const list = oversizeItems.map(x => `• ${x.title || x.id} (${x.sizeKB} KB)`).join('\n');
        alert('⚠️ 다음 자료는 단일 자료가 1MB를 초과해 저장되지 않습니다.\n본문을 줄이거나 첨부 파일을 분리해 주세요.\n\n' + list);
      }

      // 3) Delete items that no longer exist.
      //    Safety: only delete items that belong to a still-valid section.
      //    Items from removed sections (e.g. old portfolio/links) are left
      //    untouched so they aren't destroyed by a structure change.
      const validSectionKeys = new Set(SECTIONS.filter(s => !s.special).map(s => s.key));
      const idsToDelete = [];
      existingItemsSnap.forEach(d => {
        const id = d.id;
        if (currentIds.has(id)) return;
        const itemSection = (d.data() && d.data()._section) || null;
        // Only delete if it belongs to a section we still manage
        if (itemSection && validSectionKeys.has(itemSection)) {
          idsToDelete.push(id);
        }
      });

      console.log('[STORE] save: writing', itemsToWrite.length, 'items, deleting', idsToDelete.length);

      // Batch writes (max 500 ops per batch)
      const ops = [
        ...itemsToWrite.map(it => ({ type: 'set', id: String(it.id), data: it })),
        ...idsToDelete.map(id => ({ type: 'delete', id }))
      ];
      const CHUNK = 400;
      for (let i = 0; i < ops.length; i += CHUNK) {
        const batch = fbDb.batch();
        const slice = ops.slice(i, i + CHUNK);
        slice.forEach(op => {
          const ref = ITEMS_COL.doc(op.id);
          if (op.type === 'set') batch.set(ref, op.data);
          else batch.delete(ref);
        });
        await batch.commit();
      }

      console.log('[STORE] save: SUCCESS, newUpdatedAt=', newUpdatedAt);
      showSync('동기화 완료');
      return newUpdatedAt;
    } catch(e) {
      if (e.code === 'conflict') throw e;
      console.error('[STORE] save FAILED', e, 'code=', e.code, 'message=', e.message);
      alert('저장 실패: ' + (e.message || e) + '\n\n개발자도구(F12) Console 탭의 빨간색 에러 메시지를 확인해 주세요.');
      throw e;
    }
  },
  async uploadFile(file, onProgress) {
    const id = uid();
    const safeName = file.name.replace(/[^\w.\-가-힣 ]/g, '_');
    const path = `files/${id}/${safeName}`;
    const ref = fbStorage.ref(path);
    const task = ref.put(file);
    return new Promise((resolve, reject) => {
      task.on('state_changed',
        (snap) => {
          if (onProgress) onProgress(snap.bytesTransferred / snap.totalBytes);
        },
        (err) => reject(err),
        async () => {
          try {
            const url = await task.snapshot.ref.getDownloadURL();
            resolve({
              id: id,
              name: file.name,
              size: file.size,
              type: file.type,
              path: path,
              directUrl: url
            });
          } catch(e) { reject(e); }
        }
      );
    });
  },
  async deleteFile(file) {
    if (!file || !file.path) return;
    try { await fbStorage.ref(file.path).delete(); } catch(e) { /* ignore */ }
  }
};

    const container = containerRef.current;
    if (!container || !window.pdfjsLib) return;
    container.innerHTML = '';
    setError(null);
    (async () => {
      try {
        const pdf = await window.pdfjsLib.getDocument({ url, withCredentials: false }).promise;
        if (cancelled) return;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({ scale: 1.5 });
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport }).promise;
          if (cancelled) return;
          container.appendChild(canvas);
        }
      } catch(e) {
        console.error(e);
        if (!cancelled) setError('PDF를 불러올 수 없습니다.');
      }
    })();
    return () => { cancelled = true; };
  }, [url]);
  if (error) return <div className="modal-preview-empty"><p>{error}</p></div>;
  return <div className="pdf-pages" ref={containerRef}></div>;
}

/* Edit Form Modal */
function EditModal({ item, sectionKey, subCategories, onClose, onSave, onSubCatAdd }) {
  const isNew = !item || !item.id;
  const fields = SECTION_FIELDS[sectionKey] || [];
  const [form, setForm] = useState(() => {
    const f = {};
    fields.forEach(field => { f[field.key] = (item && item[field.key]) || ''; });
    f.subId = (item && item.subId) || (subCategories[0] && subCategories[0].id) || '';
    f.files = (item && item.files) ? [...item.files] : [];
    return f;
  });
  const [uploading, setUploading] = useState(false);
  const [progress, setProgress] = useState(0);
  const [dragging, setDragging] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  function setField(key, val) { setForm(prev => ({ ...prev, [key]: val })); }

  async function handleFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    setProgress(0);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const f = filesArr[i];
        const result = await Store.uploadFile(f, p => setProgress(p));
        newFiles.push(result);
      }
      setForm(prev => ({ ...prev, files: [...(prev.files||[]), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
      setProgress(0);
    }
  }

  function removeFile(fileId) {
    setForm(prev => ({ ...prev, files: prev.files.filter(f => f.id !== fileId) }));
  }

  function submit() {
    const titleField = fields.find(f => f.isTitle);
    if (titleField && !form[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({
      ...item,
      ...form,
      id: item && item.id ? item.id : uid(),
      updatedAt: Date.now()
    });
  }

  const titleField = fields.find(f => f.isTitle) || fields[0];

  return (
    <div className="form-modal" onClick={onClose}>
      <div className="form-frame" onClick={(e)=>e.stopPropagation()}>
        <div className="form-header">
          <h3>{isNew ? '새 자료 등록' : '자료 편집'}</h3>
          <button className="form-close" onClick={onClose}>×</button>
        </div>
        <div className="form-body">
          {/* Sub category selector */}
          {subCategories.length > 0 && (
            <div className="field">
              <label>분류</label>
              <select value={form.subId} onChange={e => setField('subId', e.target.value)}>
                {subCategories.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
          )}

          {fields.map(f => (
            <div className="field" key={f.key}>
              <label>{f.label} {f.required && <span className="required">*</span>}</label>
              {f.type === 'textarea' ? (
                <textarea
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              ) : f.type === 'select' ? (
                <select value={form[f.key] || ''} onChange={e => setField(f.key, e.target.value)}>
                  <option value="">선택</option>
                  {(f.options||[]).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
              ) : (
                <input
                  type={f.type === 'date' ? 'date' : 'text'}
                  value={form[f.key] || ''}
                  onChange={e => setField(f.key, e.target.value)}
                  placeholder={f.placeholder || ''}
                />
              )}
            </div>
          ))}

          {/* Files */}
          <div className="field">
            <label>첨부 파일 (이미지 / PDF / 영상)</label>
            <div
              className={'file-drop ' + (dragging ? 'dragging' : '')}
              onDragOver={(e)=>{e.preventDefault();setDragging(true);}}
              onDragLeave={()=>setDragging(false)}
              onDrop={(e)=>{
                e.preventDefault();
                setDragging(false);
                handleFiles(e.dataTransfer.files);
              }}
            >
              <div className="mark">+</div>
              <p>파일을 끌어다 놓거나 버튼으로 선택하세요</p>
              <button onClick={()=>fileInputRef.current && fileInputRef.current.click()} disabled={uploading}>
                {uploading ? `업로드 ${Math.round(progress*100)}%` : '파일 선택'}
              </button>
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{display:'none'}}
                onChange={(e)=>handleFiles(e.target.files)}
              />
            </div>
            {form.files && form.files.length > 0 && (
              <div className="file-list">
                {form.files.map(f => (
                  <div className="file-row" key={f.id}>
                    <span className="name">{f.name}</span>
                    <button onClick={()=>removeFile(f.id)} title="삭제">×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
        <div className="form-foot">
          <div className="left">
            {subCategories.length === 0 && (
              <button className="btn ghost" onClick={onSubCatAdd}>+ 분류 추가</button>
            )}
          </div>
          <div className="right">
            <button className="btn ghost" onClick={onClose}>취소</button>
            <button className="btn amber" onClick={submit} disabled={uploading}>
              {isNew ? '등록' : '저장'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============ Rich Editor ============ */
function RichEditor({ value, onChange, placeholder }) {
  const ref = useRef(null);
  const initialized = useRef(false);

  useEffect(() => {
    if (ref.current && !initialized.current) {
      ref.current.innerHTML = value || '';
      initialized.current = true;
    }
  }, []);

  // Sync if value changes externally
  useEffect(() => {
    if (ref.current && initialized.current && document.activeElement !== ref.current) {
      if (ref.current.innerHTML !== (value || '')) {
        ref.current.innerHTML = value || '';
      }
    }
  }, [value]);

  function exec(cmd, arg) {
    document.execCommand(cmd, false, arg || null);
    ref.current.focus();
    handleInput();
  }

  function handleInput() {
    if (ref.current && onChange) {
      onChange(ref.current.innerHTML);
    }
  }

  function handleHeading(level) {
    document.execCommand('formatBlock', false, level);
    ref.current.focus();
    handleInput();
  }

  function handleLink() {
    const url = prompt('링크 URL을 입력하세요', 'https://');
    if (url && url !== 'https://') exec('createLink', url);
  }

  function handlePaste(e) {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  }

  // Apply font/size to selection. Uses execCommand with styleWithCSS so it
  // produces span style="..." instead of <font> tag, and handles selections
  // that span multiple block elements (paragraphs, headings, list items).
  function applyInlineStyle(kind, value) {
    if (!ref.current) return;
    ref.current.focus();
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    if (!ref.current.contains(sel.anchorNode)) return;

    try { document.execCommand('styleWithCSS', false, true); } catch(e) {}

    if (kind === 'fontFamily') {
      // execCommand fontName uses CSS family due to styleWithCSS=true
      try {
        document.execCommand('fontName', false, value);
      } catch(e) {}
    } else if (kind === 'fontSize') {
      // fontSize via execCommand only takes 1-7. Workaround: tag with size 7,
      // then convert all elements with size="7" attr to actual style.
      try {
        document.execCommand('fontSize', false, '7');
        const tags = ref.current.querySelectorAll('font[size="7"], span[style*="font-size: xxx-large"]');
        tags.forEach(el => {
          // Replace <font size=7> with span style fontSize=value
          if (el.tagName === 'FONT') {
            const span = document.createElement('span');
            span.style.fontSize = value;
            while (el.firstChild) span.appendChild(el.firstChild);
            el.parentNode.replaceChild(span, el);
          } else {
            // span with xxx-large
            el.style.fontSize = value;
          }
        });
      } catch(e) {}
    }
    handleInput();
  }

  // Save selection range when user clicks a dropdown (selects can lose focus)
  const savedRange = useRef(null);
  function saveSelection() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      const r = sel.getRangeAt(0);
      if (ref.current && ref.current.contains(r.commonAncestorContainer)) {
        savedRange.current = r.cloneRange();
      }
    }
  }
  function restoreSelection() {
    const sel = window.getSelection();
    if (sel && savedRange.current) {
      sel.removeAllRanges();
      sel.addRange(savedRange.current);
    }
  }

  function handleFontChange(e) {
    const v = e.target.value;
    if (!v) return;
    restoreSelection();
    applyInlineStyle('fontFamily', v);
    e.target.value = '';
  }

  function handleSizeChange(e) {
    const v = e.target.value;
    if (!v) return;
    restoreSelection();
    applyInlineStyle('fontSize', v);
    e.target.value = '';
  }

  const FONTS = [

/* ============ Link Quick Add (링크 게시판 전용) ============ */
function LinkQuickAdd({ onAdd }) {
  const [url, setUrl] = useState('');
  const [title, setTitle] = useState('');
  const [busy, setBusy] = useState(false);
  async function submit() {
    let u = url.trim();
    if (!u) return;
    if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
    setBusy(true);
    const custom = title.trim();
    try {
      const preview = await fetchLinkPreview(u);
      onAdd({ ...preview, customTitle: custom });
      setUrl(''); setTitle('');
    } catch(e) {
      onAdd({ linkUrl: u, linkDomain: getDomain(u), linkTitle: '', linkDesc: '', linkImage: '', customTitle: custom });
      setUrl(''); setTitle('');
    } finally { setBusy(false); }
  }
  return (
    <div className="linkadd">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <input
        value={url}
        onChange={e=>setUrl(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') submit(); }}
        placeholder="링크(URL) 붙여넣기"
        disabled={busy}
      />
      <input
        className="linkadd-title"
        value={title}
        onChange={e=>setTitle(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') submit(); }}
        placeholder="제목 (비우면 자동)"
        disabled={busy}
      />
      <button onClick={submit} disabled={busy}>{busy ? '가져오는 중…' : '+ 링크 추가'}</button>
    </div>
  );
}

/* ============ SubCategory Page ============
   Two modes:
   - Overview (subSub === 'all'): notion body editor only, no item grid
   - Board (subSub === id): board page with item grid only, no body
============================================ */
function SubCategoryPage({
  sectionKey, sub, data, editMode,
  onBack, onSaveSub, onDelete,
  activeSubSub, setActiveSubSub,
  subSubCategories,
  onAddSubSub, onRenameSubSub, onDeleteSubSub, onMoveBoardItems,
  onCardOpen, onToggleFav, isFavId,
  onCardEdit, onCardDelete,
  onNewItem, onQuickAddLink,
  onBulkMove, onBulkDelete,
  search
}) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(sub);

  useEffect(() => { setDraft(sub); setEditing(false); }, [sub.id]);

  const sec = data.sectionData[sectionKey] || {};
  const allItems = sec.items || [];
  const itemsInSub = allItems.filter(it => String(it.subId) === String(sub.id));

  const isOverview = activeSubSub === 'all';
  const activeBoard = !isOverview ? subSubCategories.find(ss => String(ss.id) === String(activeSubSub)) : null;

  /* 게시판 내 콘텐츠 타입 탭 (전체/영상/사진/링크) */
  const [typeFilter, setTypeFilter] = useState('all');
  useEffect(() => { setTypeFilter('all'); }, [activeSubSub]);

  /* 선택 모드 (일괄 이동/삭제) */
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected] = useState({});
  const [boardMenuOpen, setBoardMenuOpen] = useState(false);
  useEffect(() => { setSelectMode(false); setSelected({}); setBoardMenuOpen(false); }, [activeSubSub]);
  useEffect(() => { if (!editMode) { setSelectMode(false); setSelected({}); } }, [editMode]);
  const selectedIds = Object.keys(selected).filter(k => selected[k]);
  function toggleSelect(item) {
    setSelected(prev => ({ ...prev, [item.id]: !prev[item.id] }));
  }
  function selectAll() {
    const next = {};
    filtered.forEach(it => { next[it.id] = true; });
    setSelected(next);
  }

  const boardItems = useMemo(() => {
    if (isOverview) return [];
    let items = itemsInSub.filter(it => String(it.subSubId || '') === String(activeSubSub));
    if (search && search.trim()) {
      const q = search.trim().toLowerCase();
      items = items.filter(it => {
        const body = (it.body || '').replace(/<[^>]*>/g, ' ');
        const haystack = [it.title, it.linkTitle, it.desc, body].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(q);
      });
    }
    return items;
  }, [itemsInSub, activeSubSub, search, isOverview]);

  const typeCounts = useMemo(() => {
    const c = { all: boardItems.length, video: 0, photo: 0, link: 0, doc: 0 };
    boardItems.forEach(it => { c[itemType(it)]++; });
    return c;
  }, [boardItems]);

  const filtered = useMemo(() => {
    if (typeFilter === 'all') return boardItems;
    return boardItems.filter(it => itemType(it) === typeFilter);
  }, [boardItems, typeFilter]);

  function setF(key, val) { setDraft(prev => ({ ...prev, [key]: val })); }

  function saveDraft() {
    if (!draft.name || !draft.name.trim()) {
      alert('분류 이름을 입력하세요.');
      return;
    }
    onSaveSub({ ...draft, name: draft.name.trim(), updatedAt: Date.now() });
    setEditing(false);
  }

  return (
    <div className="subcat-page">
      <div className="detail-topbar">
        <div className="breadcrumb">
          <span className="crumb" onClick={onBack}>{getSectionMeta(sectionKey).name}</span>
          <span className="sep">›</span>
          {isOverview ? (
            <span className="current">{sub.name}</span>
          ) : (
            <>
              <span className="crumb" onClick={() => setActiveSubSub('all')}>{sub.name}</span>
              <span className="sep">›</span>
              <span className="current">{activeBoard ? activeBoard.name : ''}</span>
            </>
          )}
        </div>
        <div className="detail-actions">
          {isOverview && editMode && !editing && (
            <button className="detail-btn" onClick={() => setEditing(true)}>분류 편집</button>
          )}
          {isOverview && editing && (
            <>
              <button className="detail-btn" onClick={() => { setDraft(sub); setEditing(false); }}>취소</button>
              <button className="detail-btn amber" onClick={saveDraft}>저장</button>
            </>
          )}
          {isOverview && editMode && !editing && (
            <button className="detail-btn danger" onClick={() => onDelete(sub)}>분류 삭제</button>
          )}
          {!isOverview && editMode && !selectMode && (
            <button className="detail-btn amber" onClick={onNewItem}>+ 새 자료</button>
          )}
          {!isOverview && editMode && boardItems.length > 0 && (
            <button
              className={'detail-btn' + (selectMode ? ' amber' : '')}
              onClick={() => { setSelectMode(v => !v); setSelected({}); }}
            >{selectMode ? '선택 종료' : '선택'}</button>
          )}
          {!isOverview && editMode && !selectMode && (
            <button className="detail-btn" onClick={() => setBoardMenuOpen(true)}>게시판 관리</button>
          )}
        </div>
      </div>

      {/* 게시판 칩 바 — 분류와 게시판 사이를 빠르게 이동 */}
      {(subSubCategories.length > 0 || editMode) && (
        <div className="board-bar">
          <button
            className={'board-chip ' + (isOverview ? 'active' : '')}
            onClick={() => setActiveSubSub('all')}
          >
            <span style={{fontWeight:600}}>{sub.name}</span>
            <span className="board-chip-meta">소개</span>
          </button>
          {subSubCategories.map(ss => {
            const c = itemsInSub.filter(it => String(it.subSubId || '') === String(ss.id)).length;
            return (
              <button
                key={ss.id}
                className={'board-chip ' + (ss.type === 'link' ? 'linktype ' : '') + (String(activeSubSub) === String(ss.id) ? 'active' : '')}
                onClick={() => setActiveSubSub(ss.id)}
              >
                {ss.name}
              </button>
            );
          })}
          {editMode && (
            <button className="board-chip dashed" onClick={onAddSubSub}>+ 게시판</button>
          )}
        </div>
      )}

      <div className="subcat-page-body">
        {isOverview ? (
          /* === OVERVIEW MODE: 문서형 소개 페이지 === */
          <div className="doc">
            <div className="detail-eyebrow">{getSectionMeta(sectionKey).name}</div>

            {editing ? (
              <input
                className="detail-title-input"
                value={draft.name || ''}
                onChange={e => setF('name', e.target.value)}
                placeholder="분류 이름"
              />
            ) : (
              <h1 className="detail-title">{sub.name}</h1>
            )}

            {(editing || sub.tagline) && (
              editing ? (
                <input
                  type="text"
                  className="doc-lead-input"
                  value={draft.tagline || ''}
                  onChange={e => setF('tagline', e.target.value)}
                  placeholder="한 줄 소개 — 예: 출판물 · 잡지 · 브랜딩"
                />
              ) : (
                <p className="doc-lead">{sub.tagline}</p>
              )
            )}

            <div className="body-section" style={{marginTop: 8}}>
              {editing ? (
                <RichEditor
                  value={draft.body || ''}
                  onChange={(html) => setF('body', html)}
                  placeholder="이 분류 소개를 자유롭게 작성하세요. 좌측 사이드바에서 사진/영상/링크 게시판을 추가할 수 있습니다."
                />
              ) : sub.body ? (
                <div className="body-readonly" dangerouslySetInnerHTML={{ __html: sub.body }} />
              ) : (
                <div className="empty" style={{padding: '40px 20px', textAlign: 'left'}}>
                  <div className="empty-text" style={{textAlign: 'left', maxWidth: 'none'}}>
                    {editMode
                      ? '"분류 편집" 버튼을 눌러 분류 소개를 작성하세요. 좌측 사이드바의 "+ 게시판"으로 사진/영상/링크 등 게시판을 만들 수 있습니다.'
                      : '아직 분류 소개가 작성되지 않았습니다.'}
                  </div>
                </div>
              )}
            </div>
          </div>
        ) : (
          /* === BOARD MODE: item grid only === */
          <>
            <div className="detail-eyebrow">{sub.name}</div>
            <h1 className="detail-title" style={{marginBottom: 18}}>
              {activeBoard ? activeBoard.name : '게시판'}
            </h1>

            {/* 콘텐츠 타입 탭 — 영상/사진/링크가 게시판 하위로 통합 */}
            {boardItems.length > 0 && (
              <div className="type-tabs">
                {['all','video','photo','link','doc'].map(t => {
                  if (t !== 'all' && typeCounts[t] === 0) return null;
                  return (
                    <button
                      key={t}
                      className={'type-tab ' + (typeFilter === t ? 'active' : '')}
                      onClick={() => setTypeFilter(t)}
                    >
                      {TYPE_LABELS[t]}
                    </button>
                  );
                })}
              </div>
            )}


            {activeBoard && activeBoard.type === 'link' && editMode && (
              <LinkQuickAdd onAdd={(preview) => onQuickAddLink(preview, activeBoard)} />
            )}

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-mark">∅</div>
                <div className="empty-title">자료가 없습니다</div>
                <div className="empty-text">
                  {editMode ? '+ 새 자료 버튼으로 등록하세요.' : '편집 모드에서 자료를 등록할 수 있습니다.'}
                </div>
              </div>
            ) : (
              <div className="grid">
                {filtered.map(item => (
                  <Card
                    key={item.id}
                    item={item}
                    sectionKey={sectionKey}
                    onOpen={(it)=>onCardOpen({...it, _section: sectionKey})}
                    onToggleFav={onToggleFav}
                    isFav={isFavId(item.id)}
                    onEdit={(it)=>onCardEdit({...it, _section: sectionKey})}
                    onDelete={(it)=>onCardDelete({...it, _section: sectionKey})}
                    editMode={editMode}
                    selectMode={selectMode}
                    selected={!!selected[item.id]}
                    onToggleSelect={toggleSelect}
                  />
                ))}
              </div>
            )}
          </>
        )}
      </div>

      {/* 선택 액션 바 */}
      {selectMode && (
        <div className="selbar">
          <span className="sb-count">{selectedIds.length}개 선택</span>
          <button onClick={selectAll}>전체 선택</button>
          <button
            className="primary"
            disabled={selectedIds.length === 0}
            style={selectedIds.length === 0 ? {opacity:.4, cursor:'default'} : null}
            onClick={() => { if (selectedIds.length) onBulkMove(selectedIds); }}
          >이동</button>
          <button
            className="danger"
            disabled={selectedIds.length === 0}
            style={selectedIds.length === 0 ? {opacity:.4, cursor:'default'} : null}
            onClick={() => { if (selectedIds.length) onBulkDelete(selectedIds, () => { setSelected({}); }); }}
          >삭제</button>
          <button onClick={() => { setSelectMode(false); setSelected({}); }}>완료</button>
        </div>
      )}

      {/* 게시판 관리 액션 시트 */}
      {boardMenuOpen && activeBoard && (
        <BoardActionSheet
          board={activeBoard}
          onClose={() => setBoardMenuOpen(false)}
          onRename={() => onRenameSubSub(activeBoard)}
          onMoveAll={() => onMoveBoardItems(activeBoard)}
          onDelete={() => onDeleteSubSub(activeBoard)}
        />
      )}
    </div>
  );
}


/* ============ Detail Page ============ */
function Detail({ item, sectionKey, data, onClose, onSave, onDelete, onToggleFav, isFav, onPreviewMedia, editMode }) {
  const sectionMeta = getSectionMeta(sectionKey);
  const fields = SECTION_FIELDS[sectionKey] || [];
  const titleField = fields.find(f => f.isTitle) || fields[0];

  const [editing, setEditing] = useState(item._isNew || item._forceEdit || false);
  const [draft, setDraft] = useState(item);

  // Reset draft when switching to a different item (different id), or when
  // the item changes externally and we are NOT actively editing.
  useEffect(() => {
    setDraft(item);
  }, [item.id]);
  useEffect(() => {
    if (!editing) setDraft(item);
  }, [item, editing]);
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, [item.id]);

  const sub = useMemo(() => {
    const subs = (data.sectionData[sectionKey] && data.sectionData[sectionKey].subCategories) || [];
    return subs.find(s => String(s.id) === String(item.subId));
  }, [data, sectionKey, item]);

  const subSub = useMemo(() => {
    if (!sub) return null;
    const subSubs = sub.subSubCategories || [];
    return subSubs.find(s => String(s.id) === String(item.subSubId));
  }, [sub, item]);

  function setF(key, val) { setDraft(prev => ({ ...prev, [key]: val })); }

  function saveDraft() {
    if (!draft[titleField.key]) {
      alert(titleField.label + '을(를) 입력하세요.');
      return;
    }
    onSave({ ...draft, updatedAt: Date.now() });
    setEditing(false);
  }

  function cancelEdit() {
    setDraft(item);
    setEditing(false);
  }

  const files = (editing ? draft.files : item.files) || [];
  const fileInputRef = useRef(null);
  const [uploading, setUploading] = useState(false);

  async function uploadFiles(filesArr) {
    if (!filesArr || filesArr.length === 0) return;
    setUploading(true);
    try {
      const newFiles = [];
      for (let i = 0; i < filesArr.length; i++) {
        const result = await Store.uploadFile(filesArr[i]);
        newFiles.push(result);
      }
      setDraft(prev => ({ ...prev, files: [...(prev.files || []), ...newFiles] }));
    } catch(e) {
      alert('업로드 실패: ' + (e.message || e));
    } finally {
      setUploading(false);
    }
  }

  function removeFile(fileId) {
    setDraft(prev => ({ ...prev, files: (prev.files || []).filter(f => f.id !== fileId) }));
  }

  return (
    <div className="detail">
      <div className="detail-topbar">
        <div className="breadcrumb">
          <span className="crumb" onClick={onClose}>{sectionMeta.name}</span>
          {sub && <>
            <span className="sep">›</span>
            <span className="crumb">{sub.name}</span>
          </>}
          {subSub && <>
            <span className="sep">›</span>
            <span className="crumb">{subSub.name}</span>
          </>}
          <span className="sep">›</span>
          <span className="current">{item[titleField.key] || '제목 없음'}</span>
        </div>
        <div className="detail-actions">
          <button
            className={'detail-btn fav ' + (isFav ? 'active' : '')}
            onClick={() => onToggleFav(item)}
            title="즐겨찾기"
          >{isFav ? '★' : '☆'}</button>
          {editMode && !editing && (
            <button className="detail-btn" onClick={() => setEditing(true)}>편집</button>
          )}
          {editing && (
            <>
              <button className="detail-btn" onClick={cancelEdit}>취소</button>
              <button className="detail-btn amber" onClick={saveDraft}>저장</button>
            </>
          )}
          {editMode && !editing && (
            <button className="detail-btn danger" onClick={() => onDelete(item)}>삭제</button>
          )}

                          className="detail-btn"

                            setDraft(prev => ({ ...prev, ...p, title: prev.title || p.linkTitle }));
                          }}
                        >미리보기 갱신</button>
                      </div>
                    ) : (
                      <a href={item.linkUrl} target="_blank" rel="noopener noreferrer">{item.linkUrl}</a>
                    )}
                  </div>
                </div>
              )}
              {visibleFields.map(f => {
                const v = editing ? draft[f.key] : item[f.key];
                if (!editing && !v) return null;
                return (
                  <div className="props-row" key={f.key}>
                    <div className="props-label">{f.label}{f.required && editing ? ' *' : ''}</div>
                    <div className="props-value">
                      {editing ? (
                        f.type === 'textarea' ? (
                          <textarea value={v || ''} onChange={e => setF(f.key, e.target.value)} placeholder={f.placeholder || ''} />
                        ) : (
                          <input
                            type="text"
                            value={v || ''}
                            onChange={e => setF(f.key, e.target.value)}
                            placeholder={f.placeholder || ''}
                          />
                        )
                      ) : (
                        f.key.toLowerCase().includes('url') && v ? (
                          <a href={v} target="_blank" rel="noopener noreferrer">{v}</a>
                        ) : v
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* Inline video embed (보기 모드, videoUrl 있을 때) */}
        {!editing && (item.videoUrl || item.linkUrl) && (() => {
          const ytId = getYouTubeId(item.videoUrl) || getYouTubeId(item.linkUrl);
          if (ytId) {
            return (
              <div className="inline-video">
                <iframe
                  src={`https://www.youtube.com/embed/${ytId}?rel=0`}

                  allowFullScreen

            return (

                <video src={item.videoUrl} controls />

          return null;

        {/* Link preview (보기 모드, OG 이미지/설명) */}
        {!editing && item.linkUrl && !getYouTubeId(item.linkUrl) && (item.linkImage || item.linkDesc) && (

        {!editing && (() => {
          const imgs = (item.files || []).filter(f => isImageFile(f.name) && f.directUrl);
          if (imgs.length === 0) return null;

            <div className="inline-images">
