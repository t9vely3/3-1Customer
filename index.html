<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIX ACADEMY · 상담 자료실</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

  <style>
    :root {
      /* === Refined Modern Theme (2026) === */
      /* Primary surfaces (page backgrounds) */
      --bg: #F5F5F3;            /* main page background (warm gray-white) */
      --bg-soft: #ECECE8;       /* sidebar, sub-surfaces */
      --bg-paper: #FFFFFF;      /* card, modal forms */
      --bg-elev: #FFFFFF;       /* elevated input bg */

      /* Text */
      --ink: #191A1F;           /* primary text (near-black) */
      --ink-strong: #0B0C10;    /* hero titles, max contrast */
      --muted: #5B5F68;         /* secondary text */
      --muted-2: #8E929B;       /* tertiary, hints */

      /* Lines & borders */
      --line: rgba(11,12,16,0.10);
      --line-soft: rgba(11,12,16,0.05);
      --line-strong: rgba(11,12,16,0.18);

      /* Accents (var names kept for compatibility — deep indigo) */
      --amber: #3F3FB8;         /* main accent — deep indigo, used sparingly */
      --amber-soft: #7B7BE0;    /* lighter accent for badges/decoration */
      --amber-bg: rgba(63,63,184,0.06);
      --rose: #C64545;

      /* Radius & shadow tokens */
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-card: 0 1px 2px rgba(11,12,16,0.04), 0 6px 20px rgba(11,12,16,0.05);
      --shadow-hover: 0 2px 4px rgba(11,12,16,0.06), 0 14px 34px rgba(11,12,16,0.10);

      /* Dark surfaces (for previews / modals only) */
      --dark: #0C0D12;
      --dark-soft: #16171E;
      --dark-line: #23242E;
      --on-dark: #F5F5F3;
      --on-dark-muted: #9AA1B0;

      /* Legacy aliases (so existing rules keep working) */
      --ink-soft: var(--bg-soft);
      --ink-line: var(--line);
      --musk: var(--bg-soft);
      --cream: var(--bg);
      --cream-soft: var(--bg-soft);
      --paper: var(--bg-paper);
      --text: var(--ink);
      --muted-light: var(--muted-2);

      --serif: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    img { -webkit-user-drag: none; user-select: none; }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ============ Loading (kept dark) ============ */
    #loading {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      z-index: 9999; gap: 24px;
    }
    #loading.hidden { display: none; }
    .loading-mark {
      font-family: var(--serif);
      font-size: 28px; font-style: italic; letter-spacing: .04em;
      color: var(--on-dark);
    }
    .loading-mark .dot { color: var(--amber-soft); }
    .loading-bar {
      width: 120px; height: 1px; background: rgba(244,239,230,0.15); position: relative; overflow: hidden;
    }
    .loading-bar::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 40%;
      background: var(--amber-soft); animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ============ Login (kept dark for first impression) ============ */
    #login-screen {
      position: fixed; inset: 0;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; padding: 24px;
    }
    #login-screen.hidden { display: none; }
    #login-screen::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(212,162,76,0.08), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(44,79,224,0.05), transparent 50%);
      pointer-events: none;
    }
    .login-frame {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 56px 44px 44px;
      background: var(--dark-soft);
      border: 1px solid var(--dark-line);
    }
    .login-frame::before, .login-frame::after {
      content: ''; position: absolute;
      width: 24px; height: 24px;
      border: 1px solid var(--amber-soft);
    }
    .login-frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .login-frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    .login-eyebrow {
      font-family: var(--sans);
      font-size: 11px; font-weight: 500; letter-spacing: .3em;
      color: var(--amber-soft); text-transform: uppercase;
      margin-bottom: 16px;
    }
    .login-title {
      font-family: var(--serif);
      font-size: 36px; font-weight: 500; line-height: 1.1;
      color: var(--on-dark); margin-bottom: 8px;
    }
    .login-title em { font-style: italic; color: var(--amber-soft); }
    .login-sub {
      font-size: 13px; color: var(--on-dark-muted);
      margin-bottom: 36px; line-height: 1.6;
    }
    .login-field { margin-bottom: 18px; }
    .login-field label {
      display: block; font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      color: var(--on-dark-muted); margin-bottom: 8px; font-weight: 500;
    }
    .login-field input {
      width: 100%; padding: 12px 0; background: transparent;
      border: none; border-bottom: 1px solid var(--dark-line);
      color: var(--on-dark); font-size: 14px; outline: none;
      transition: border-color .25s;
    }
    .login-field input:focus { border-bottom-color: var(--amber-soft); }
    .login-submit {
      width: 100%; padding: 14px; margin-top: 12px;
      background: var(--amber-soft); color: var(--dark);
      border: none; font-size: 12px; font-weight: 600; letter-spacing: .25em; text-transform: uppercase;
      transition: background .2s;
    }
    .login-submit:hover { background: #E2B871; }
    .login-submit:disabled { background: var(--dark-line); color: var(--on-dark-muted); cursor: not-allowed; }
    .login-error {
      color: #E89B8A; font-size: 12px; text-align: center;
      margin-top: 16px; min-height: 16px; line-height: 1.5;
    }

    /* ============ App Shell ============ */
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* ============ Sidebar (light editorial) ============ */
    .sidebar {
      background: var(--bg-soft);
      color: var(--ink);
      padding: 28px 0;
      position: sticky; top: 0;
      height: 100vh; overflow-y: auto;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--line);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(14,21,37,0.18); }

    .brand {
      padding: 0 28px 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }
    .brand-mark {
      font-family: var(--serif);
      font-size: 22px; font-style: italic; font-weight: 500;
      letter-spacing: .02em; line-height: 1;
      color: var(--ink-strong);
    }
    .brand-mark .amp { color: var(--amber); }
    .brand-sub {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin-top: 8px; font-weight: 500;
    }

    .search-box {
      margin: 0 20px 24px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg-paper);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 10px 12px 10px 34px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--ink-strong); }
    .search-box input::placeholder { color: var(--muted-2); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; opacity: .5;
      color: var(--ink);
    }

    .nav-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); padding: 0 28px; margin-bottom: 10px;
      font-weight: 500;
    }
    .nav-list { list-style: none; margin-bottom: 28px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px;
      font-size: 14px; color: var(--ink);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .nav-item:hover { background: rgba(14,21,37,0.04); }
    .nav-item.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber);
    }
    .nav-item .nav-name { font-weight: 500; }
    .nav-item .nav-count {
      font-size: 11px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .nav-item.active .nav-count { color: var(--amber); opacity: .8; }

    .nav-item.nav-sub {
      padding-left: 44px;
      font-size: 14px;
      color: var(--ink); opacity: 0.9;
    }
    .nav-item.nav-sub.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber); opacity: 1;
    }
    .nav-item.nav-subsub {
      padding-left: 60px;
      font-size: 13px;
      color: var(--ink); opacity: 0.8;
    }
    .nav-item.nav-subsub.active {
      background: var(--bg-paper);
      border-left-color: var(--amber);
      color: var(--amber); opacity: 1; font-weight: 600;
    }

    .sidebar-footer {
      margin-top: auto; padding: 20px 28px;
      border-top: 1px solid var(--line);
      font-size: 11px; color: var(--muted);
    }
    .user-email {
      display: block; color: var(--ink); font-size: 12px;
      margin-bottom: 8px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar-actions { display: flex; gap: 8px; }
    .sidebar-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      padding: 7px 10px;
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      font-weight: 500;
      transition: border-color .2s, color .2s, background .2s;
    }
    .sidebar-btn:hover { border-color: var(--ink-strong); background: var(--ink-strong); color: var(--bg); }
    .sidebar-btn.danger:hover { border-color: var(--rose); background: var(--rose); color: var(--bg); }

    /* ============ Main Content ============ */
    .main {
      background: var(--bg);
      min-height: 100vh;
      position: relative;
    }
    .main-header {
      padding: 48px 56px 28px;
      border-bottom: 1px solid var(--line-soft);
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 24px;
    }
    .header-text { flex: 1; }
    .header-eyebrow {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); font-weight: 500;
      margin-bottom: 12px;
    }
    .header-title {
      font-family: var(--serif);
      font-size: 38px; font-weight: 700; line-height: 1.1;
      color: var(--ink-strong); letter-spacing: -.02em;
    }
    .header-title em { font-style: normal; color: var(--amber); }
    .header-meta {
      font-size: 13px; color: var(--muted); margin-top: 14px;
      display: flex; gap: 16px; align-items: center;
    }
    .header-meta .dot { width: 3px; height: 3px; background: var(--muted-light); border-radius: 50%; }

    .header-actions { display: flex; gap: 10px; }
    .btn {
      padding: 10px 18px;
      background: var(--ink-strong); color: var(--bg);
      border: 1px solid var(--ink-strong);
      font-size: 12px; letter-spacing: .15em; text-transform: uppercase;
      font-weight: 500;
      transition: background .2s, color .2s, border-color .2s;
    }
    .btn:hover { background: var(--ink); border-color: var(--ink); }
    .btn.ghost { background: transparent; color: var(--ink-strong); }
    .btn.ghost:hover { background: var(--ink-strong); color: var(--bg); }
    .btn.amber { background: var(--amber); border-color: var(--amber); color: #fff; }
    .btn.amber:hover { background: #9C7022; border-color: #9C7022; }

    /* ============ Sub-categories ============ */
    .subcat-bar {
      padding: 18px 56px;
      display: flex; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid rgba(14,21,37,0.06);
    }
    .subcat-chip {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid rgba(14,21,37,0.15);
      color: var(--text);
      font-size: 12px; font-weight: 500;
      transition: all .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .subcat-chip:hover { border-color: var(--ink-strong); color: var(--ink-strong); }
    .subcat-chip.active {
      background: var(--ink-strong); color: var(--bg); border-color: var(--ink-strong);
    }
    .subcat-chip .chip-count {
      font-size: 10px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .subcat-chip.active .chip-count { color: var(--bg); opacity: .7; }

    .subcat-add {
      padding: 7px 12px;
      background: transparent;
      border: 1px dashed rgba(14,21,37,0.25);
      color: var(--muted);
      font-size: 12px;
    }
    .subcat-add:hover { color: var(--ink); border-color: var(--ink); }

    /* ============ Card Grid ============ */
    .grid-wrap { padding: 28px 40px 80px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--paper);
      border: 1px solid rgba(14,21,37,0.08);
      transition: border-color .2s, transform .2s;
      cursor: pointer;
      position: relative;
      display: flex; flex-direction: column;
    }
    .card:hover {
      border-color: var(--ink);
      transform: translateY(-2px);
    }
    .card-thumb {
      aspect-ratio: 16 / 10;
      background: var(--cream-soft);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .card-thumb img, .card-thumb video {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .card-thumb-placeholder {
      font-family: var(--serif);
      font-size: 32px; font-style: italic;
      color: var(--muted-light);
    }
    .card-thumb-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 8px; background: rgba(14,21,37,0.85);
      color: var(--cream);
      font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
      backdrop-filter: blur(4px);
    }
    .card-fav {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px;
      background: rgba(251,248,242,0.92);
      border: none;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
      backdrop-filter: blur(4px);
    }
    .card-fav:hover { background: var(--paper); }
    .card-fav svg { width: 16px; height: 16px; fill: none; stroke: var(--ink); stroke-width: 1.5; }
    .card-fav.active svg { fill: var(--amber); stroke: var(--amber); }

    .card-play-badge {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      background: rgba(14,21,37,0.78);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }
    .card-play-badge svg { margin-left: 2px; }
    .card:hover .card-play-badge { background: var(--amber); }

    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex; flex-direction: row; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .card-body-compact .card-title {
      margin-bottom: 0;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-title {
      font-family: var(--serif);
      font-size: 15px; font-weight: 700; line-height: 1.4;
      color: var(--ink-strong);
      letter-spacing: -.01em;
    }
    .card-edit-actions {
      display: flex; gap: 4px;
      flex-shrink: 0;
    }
    .card-edit-btn {
      width: 26px; height: 26px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .15s;
    }
    .card-edit-btn:hover { border-color: var(--line-strong); color: var(--ink); }

    /* ============ Empty state ============ */
    .empty {
      padding: 80px 40px;
      text-align: center;
      color: var(--muted);
    }
    .empty-mark {
      font-family: var(--serif);
      font-size: 64px; font-style: italic;
      color: var(--line-strong);
      margin-bottom: 12px;
    }
    .empty-title {
      font-family: var(--serif);
      font-size: 22px; color: var(--ink-strong);
      margin-bottom: 6px;
    }
    .empty-text { font-size: 13px; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ============ Fullscreen Modal (Preview) ============ */
    /* ============ Fullscreen Modal (kept dark — best for media) ============ */
    .modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.94);
      z-index: 9500;
      display: flex; flex-direction: column;
      backdrop-filter: blur(8px);
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 36px;
      border-bottom: 1px solid rgba(244,239,230,0.1);
      color: var(--on-dark);
      flex-shrink: 0;
    }
    .modal-title-block { flex: 1; min-width: 0; }
    .modal-eyebrow {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber-soft); margin-bottom: 4px; font-weight: 500;
    }
    .modal-title {
      font-family: var(--serif);
      font-size: 24px; font-weight: 500;
      color: var(--on-dark);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .modal-actions { display: flex; gap: 8px; align-items: center; }
    .modal-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(244,239,230,0.2);
      color: var(--on-dark);
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      transition: all .2s;
    }
    .modal-btn:hover { border-color: var(--amber-soft); color: var(--amber-soft); }
    .modal-btn.close { padding: 8px 14px; }

    .modal-body {
      flex: 1; overflow: auto;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
    }
    .modal-preview {
      background: var(--dark-soft);
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      overflow: auto;
    }
    .modal-preview img, .modal-preview video {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-preview iframe {
      width: 100%; max-width: 1200px;
      aspect-ratio: 16/9;
      border: none; background: #000;
    }
    .modal-preview .pdf-pages {
      display: flex; flex-direction: column; gap: 16px;
      width: 100%; max-width: 900px;
    }
    .modal-preview .pdf-pages canvas {
      width: 100%; height: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .modal-preview-empty {
      text-align: center; color: var(--on-dark-muted);
    }
    .modal-preview-empty .mark {
      font-family: var(--serif); font-size: 80px; font-style: italic;
      color: rgba(244,239,230,0.18); margin-bottom: 16px;
    }

    .modal-info {
      background: var(--dark);
      color: var(--on-dark);
      padding: 36px;
      overflow-y: auto;
      border-left: 1px solid var(--dark-line);
    }
    .info-section { margin-bottom: 28px; }
    .info-section:last-child { margin-bottom: 0; }
    .info-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--on-dark-muted); font-weight: 500;
      margin-bottom: 8px;
    }
    .info-value {
      font-size: 14px; line-height: 1.6;
      color: var(--on-dark);
      white-space: pre-wrap; word-break: break-word;
    }
    .info-value a { color: var(--amber-soft); text-decoration: none; border-bottom: 1px solid rgba(212,162,76,0.3); }
    .info-value a:hover { border-bottom-color: var(--amber-soft); }
    .info-value.serif {
      font-family: var(--serif);
      font-size: 22px; line-height: 1.3;
    }

    /* ============ Forms / Editor Modal ============ */
    .form-modal {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.7);
      z-index: 9600;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    .form-frame {
      background: var(--paper);
      width: 100%; max-width: 640px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      border: 1px solid var(--ink-line);
      position: relative;
    }
    .form-header {
      padding: 28px 36px 20px;
      border-bottom: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: center;
    }
    .form-header h3 {
      font-family: var(--serif);
      font-size: 26px; font-weight: 500;
      color: var(--ink);
    }
    .form-close {
      background: none; border: none;
      font-size: 24px; color: var(--muted);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .form-close:hover { color: var(--ink); }
    .form-body {
      padding: 28px 36px;
      overflow-y: auto;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      margin-bottom: 8px;
    }
    .field label .required { color: var(--rose); }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 10px 12px;
      background: var(--cream);
      border: 1px solid rgba(14,21,37,0.12);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      border-color: var(--ink);
    }
    .field textarea {
      min-height: 90px; resize: vertical;
      font-family: inherit;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .file-drop {
      border: 1px dashed rgba(14,21,37,0.2);
      padding: 24px; text-align: center;
      background: var(--cream);
      transition: border-color .2s, background .2s;
    }
    .file-drop:hover { border-color: var(--ink); background: var(--paper); }
    .file-drop.dragging { border-color: var(--amber); background: rgba(212,162,76,0.05); }
    .file-drop .mark {
      font-family: var(--serif); font-size: 32px; font-style: italic;
      color: var(--muted-light); margin-bottom: 6px;
    }
    .file-drop p { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .file-drop button {
      padding: 6px 14px;
      background: var(--ink); color: var(--cream);
      border: none;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
    }
    .file-list {
      margin-top: 14px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .file-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--cream-soft);
      font-size: 12px;
    }
    .file-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .file-row button {
      background: none; border: none; color: var(--muted);
      font-size: 14px; padding: 0 6px;
    }
    .file-row button:hover { color: var(--rose); }

    .form-foot {
      padding: 20px 36px;
      border-top: 1px solid rgba(14,21,37,0.08);
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
    }
    .form-foot .left { display: flex; gap: 8px; }
    .form-foot .right { display: flex; gap: 10px; }

    /* ============ Home (light editorial) ============ */
    .home {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      position: relative;
      overflow: hidden;
    }
    .home::before {
      content: ''; position: absolute; top: -180px; right: -120px; width: 720px; height: 720px;
      background: radial-gradient(circle at 50% 50%, rgba(44,79,224,0.08), transparent 62%);
      pointer-events: none;
    }
    .home::after { content: none; }
    .home-orbit { display: none; }
    .home-inner { position: relative; z-index: 1; padding: 56px 64px 80px; }

    .home-topbar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10px; letter-spacing: .3em; color: var(--muted);
      text-transform: uppercase; font-weight: 500;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 80px;
    }
    .home-topbar .right { display: flex; gap: 20px; align-items: center; }

    .home-hero { margin-bottom: 64px; max-width: 720px; }
    .home-eyebrow {
      font-size: 11px; letter-spacing: .35em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .home-eyebrow::before {
      content: ''; width: 24px; height: 1px; background: var(--amber);
    }
    .home-title {
      font-family: var(--serif);
      font-size: 64px; font-weight: 700; line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--ink-strong);
      margin-bottom: 28px;
    }
    .home-title em { font-style: normal; color: var(--amber); }
    .home-tagline {
      font-size: 16px; color: var(--ink); line-height: 1.7;
      max-width: 520px;
      white-space: pre-wrap;
      opacity: 0.78;
    }

    .home-title-edit, .home-tagline-edit {
      width: 100%;
      background: var(--bg-paper);
      border: 1px dashed rgba(44,79,224,0.5);
      color: var(--ink);
      font-family: inherit; font-size: inherit; font-weight: inherit;
      line-height: inherit; letter-spacing: inherit;
      padding: 8px 12px;
      outline: none;
      resize: vertical;
    }
    .home-title-edit { font-family: var(--serif); color: var(--ink-strong); }
    .home-title-edit:focus, .home-tagline-edit:focus {
      border-color: var(--amber); border-style: solid;
    }

    .home-stats {
      display: flex; gap: 56px;
      padding: 24px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 80px;
    }
    .home-stat-num {
      font-family: var(--serif);
      font-size: 44px; font-weight: 500; line-height: 1;
      color: var(--ink-strong);
      font-variant-numeric: tabular-nums;
    }
    .home-stat-num.amber { color: var(--amber); }
    .home-stat-label {
      font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); margin-top: 8px; font-weight: 500;
    }

    .home-section-label {
      font-size: 11px; letter-spacing: .35em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
    }
    .home-section-label::before {
      content: ''; width: 24px; height: 1px; background: var(--muted-2);
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .home-card {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 24px 24px;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, transform .2s, box-shadow .2s, background .2s;
      min-height: 168px;
      display: flex; flex-direction: column;
    }
    .home-card:hover {
      border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14,21,37,0.08);
    }
    .home-card.featured {
      background: var(--amber-bg);
      border-color: var(--amber);
    }
    .home-card-num {
      font-family: var(--serif);
      font-size: 30px; font-style: italic; font-weight: 500;
      color: var(--amber);
      line-height: 1; margin-bottom: 18px;
    }
    .home-card-title {
      font-size: 15px; font-weight: 600;
      color: var(--ink-strong);
      margin-bottom: 6px;
      letter-spacing: -.005em;
    }
    .home-card-desc {
      font-size: 13px; color: var(--muted);
      line-height: 1.5; margin-bottom: 14px;
    }
    .home-card-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
    }
    .home-card-foot .arrow {
      color: var(--amber); font-size: 14px; letter-spacing: 0;
    }
    .home-card-count { font-variant-numeric: tabular-nums; }
    .home-card-badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
    }

    .home-edit-actions {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .home-edit-btn {
      padding: 8px 18px;
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      font-weight: 600;
      background: var(--ink-strong); color: var(--bg);
      border: 1px solid var(--ink-strong);
      transition: opacity .2s;
    }
    .home-edit-btn:hover { opacity: 0.85; }
    .home-edit-btn.ghost {
      background: transparent; color: var(--ink);
      border-color: var(--line-strong);
    }
    .home-edit-btn.ghost:hover { border-color: var(--ink); }

    @media (max-width: 1100px) {
      .home-grid { grid-template-columns: repeat(3, 1fr); }
      .home-title { font-size: 56px; }
      .home-inner { padding: 44px 40px 60px; }
    }
    @media (max-width: 820px) {
      .home-grid { grid-template-columns: repeat(2, 1fr); }
      .home-title { font-size: 40px; }
      .home-inner { padding: 80px 24px 48px; }
      .home-stats { gap: 32px; flex-wrap: wrap; }
      .home-stat-num { font-size: 32px; }
      .home::after, .home-orbit { display: none; }
    }
    @media (max-width: 480px) {
      .home-grid { grid-template-columns: 1fr; }
      .home-title { font-size: 32px; }
    }

    /* ============ SubCategory Landing (분류 카드 그리드) ============ */
    .subcat-landing { padding: 32px 56px 80px; }
    .subcat-landing-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 920px;
    }
    .subcat-card {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 28px 24px;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, transform .2s, box-shadow .2s;
      min-height: 168px;
      display: flex; flex-direction: column;
    }
    .subcat-card:hover {
      border-color: var(--amber);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(14,21,37,0.06);
    }
    .subcat-card-num {
      font-family: var(--serif);
      font-size: 28px; font-weight: 700; font-style: italic;
      color: var(--amber);
      line-height: 1; margin-bottom: 16px;
    }
    .subcat-card-title {
      font-size: 19px; font-weight: 700;
      color: var(--ink-strong);
      margin-bottom: 6px;
      letter-spacing: -.015em;
    }
    .subcat-card-meta {
      font-size: 12px; color: var(--muted);
      margin-bottom: 14px; line-height: 1.5;
    }
    .subcat-card-foot {
      margin-top: auto;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted);
      letter-spacing: .1em;
    }
    .subcat-card-foot .arrow {
      color: var(--amber); font-size: 16px;
    }
    .subcat-card-actions {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .subcat-card:hover .subcat-card-actions { opacity: 1; }
    .subcat-card-action {
      width: 24px; height: 24px;
      background: var(--bg-paper); border: 1px solid var(--line);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 11px;
    }
    .subcat-card-action:hover { color: var(--ink); border-color: var(--ink); }
    .subcat-add-card {
      background: transparent;
      border: 1px dashed var(--line-strong);
      padding: 28px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      min-height: 168px;
    }
    .subcat-add-card:hover { border-color: var(--ink); color: var(--ink); border-style: solid; }

    /* ============ SubCategory Detail Page (분류의 노션 페이지) ============ */
    .subcat-page {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .subcat-page-cover {
      height: 120px;
      background: linear-gradient(135deg, rgba(44,79,224,0.14), rgba(14,21,37,0.06));
    }
    .subcat-page-body {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 36px 60px;
    }

    .board-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 36px;
      max-width: 100%;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line-soft);
      background: var(--bg);
    }
    .board-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      font-family: inherit;
    }
    .board-chip:hover { border-color: var(--ink-strong); color: var(--ink-strong); }
    .board-chip.active {
      background: var(--ink-strong);
      color: var(--bg);
      border-color: var(--ink-strong);
    }
    .board-chip.dashed {
      border-style: dashed;
      color: var(--muted);
      font-size: 12px;
    }
    .board-chip.dashed:hover { color: var(--ink); border-color: var(--ink); }
    .board-chip-count {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      opacity: 0.6;
    }
    .board-chip.active .board-chip-count { opacity: 0.8; }
    .board-chip-meta {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
    }
    .board-chip.active .board-chip-meta {
      color: var(--bg);
      opacity: 0.7;
    }

    @media (max-width: 820px) {
      .subcat-landing { padding: 24px; }
      .subcat-landing-grid { grid-template-columns: 1fr; }
      .subcat-page-body { padding: 24px 20px 60px; }
    }

    /* ============ Detail Page (Notion-style) ============ */
    .detail {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }
    .detail-topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 32px;
      border-bottom: 1px solid var(--line-soft);
      font-size: 12px; color: var(--muted);
      position: sticky; top: 0; background: var(--bg);
      z-index: 100;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap;
    }
    .breadcrumb a, .breadcrumb span.crumb {
      color: var(--muted); cursor: pointer; font-size: 12px;
      background: none; border: none; font-family: inherit;
      padding: 0;
    }
    .breadcrumb a:hover, .breadcrumb span.crumb:hover { color: var(--ink); }
    .breadcrumb .sep { color: var(--amber); font-weight: 500; }
    .breadcrumb .current { color: var(--ink-strong); font-weight: 600; }

    .detail-actions { display: flex; gap: 6px; }
    .detail-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      font-weight: 500;
      transition: all .15s;
      font-family: inherit;
    }
    .detail-btn:hover { background: var(--ink-strong); color: var(--bg); border-color: var(--ink-strong); }
    .detail-btn.amber { background: var(--amber); color: #fff; border-color: var(--amber); }
    .detail-btn.amber:hover { background: #9C7022; border-color: #9C7022; }
    .detail-btn.fav.active { background: var(--amber); color: #fff; border-color: var(--amber); }
    .detail-btn.danger:hover { background: var(--rose); border-color: var(--rose); }

    .detail-cover {
      height: 140px;
      background: linear-gradient(135deg, rgba(44,79,224,0.12), rgba(14,21,37,0.06));
    }

    .detail-body {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 36px 60px;
    }
    .inline-video {
      margin: 20px 0 24px;
      background: #000;
      aspect-ratio: 16 / 9;
      max-height: 540px;
    }
    .inline-video iframe, .inline-video video {
      width: 100%; height: 100%;
      border: none; display: block;
    }
    .inline-images {
      margin: 20px 0 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .inline-images img {
      width: 100%; max-width: 100%;
      max-height: 720px;
      object-fit: contain;
      background: var(--bg-paper);
    }
    .detail-eyebrow {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--amber); font-weight: 600;
      margin-bottom: 12px;
    }
    .detail-title {
      font-size: 36px; font-weight: 700; line-height: 1.15;
      color: var(--ink-strong); letter-spacing: -.02em;
      margin-bottom: 28px;
    }
    .detail-title-input {
      width: 100%;
      font-size: 36px; font-weight: 700; line-height: 1.15;
      color: var(--ink-strong); letter-spacing: -.02em;
      background: transparent;
      border: 1px dashed rgba(44,79,224,0.4);
      padding: 4px 8px;
      outline: none;
      font-family: inherit;
    }
    .detail-title-input:focus { border-style: solid; border-color: var(--amber); }

    /* Property table */
    .props {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 4px 18px;
      margin-bottom: 32px;
    }
    .props-row {
      display: grid; grid-template-columns: 130px 1fr;
      padding: 11px 0;
      border-bottom: 1px solid var(--line-soft);
      font-size: 13px;
      align-items: start;
    }
    .props-row:last-child { border-bottom: none; }
    .props-label {
      color: var(--muted); font-weight: 500;
      font-size: 12px;
    }
    .props-value { color: var(--ink); white-space: pre-wrap; word-break: break-word; }
    .props-value a { color: var(--amber); text-decoration: none; border-bottom: 1px solid rgba(44,79,224,0.3); }
    .props-value input, .props-value textarea, .props-value select {
      width: 100%;
      background: transparent;
      border: 1px solid var(--line);
      padding: 6px 8px;
      font-size: 13px;
      color: var(--ink);
      font-family: inherit;
      outline: none;
    }
    .props-value input:focus, .props-value textarea:focus, .props-value select:focus {
      border-color: var(--ink-strong);
    }
    .props-value textarea { min-height: 60px; resize: vertical; }

    /* Body editor */
    .body-section { margin-top: 28px; }
    .body-label {
      font-size: 11px; letter-spacing: .3em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      margin-bottom: 14px;
    }

    .editor-toolbar {
      display: flex; gap: 4px; flex-wrap: wrap;
      padding: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-bottom: none;
      position: sticky; top: 50px; z-index: 50;
    }
    .toolbar-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      transition: background .12s, border-color .12s;
      min-width: 30px;
      font-family: inherit;
    }
    .toolbar-btn:hover { background: var(--bg-paper); border-color: var(--line); }
    .toolbar-btn.h1 { font-weight: 700; }
    .toolbar-select {
      padding: 5px 8px;
      background: var(--bg-paper);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .toolbar-select:hover { border-color: var(--ink-strong); }
    .toolbar-select:focus { border-color: var(--ink-strong); }
    .toolbar-sep {
      width: 1px; background: var(--line); margin: 4px 4px;
    }

    .editor {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 24px 28px;
      min-height: 320px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--ink);
      outline: none;
    }
    .editor:focus { border-color: var(--ink-strong); }
    .editor[contenteditable="true"]:empty::before {
      content: attr(data-placeholder);
      color: var(--muted-2);
      pointer-events: none;
      display: block;
    }
    .editor h1 { font-size: 26px; font-weight: 700; margin: 18px 0 10px; line-height: 1.2; color: var(--ink-strong); }
    .editor h2 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; line-height: 1.3; color: var(--ink-strong); }
    .editor h3 { font-size: 16px; font-weight: 700; margin: 14px 0 6px; color: var(--ink-strong); }
    .editor p { margin: 0 0 10px; }
    .editor ul, .editor ol { padding-left: 24px; margin: 0 0 12px; }
    .editor li { margin-bottom: 4px; }
    .editor blockquote {
      margin: 14px 0;
      padding: 12px 18px;
      border-left: 3px solid var(--amber);
      background: var(--amber-bg);
      color: var(--ink);
      font-size: 14px;
    }
    .editor a { color: var(--amber); border-bottom: 1px solid rgba(44,79,224,0.3); text-decoration: none; }
    .editor strong { font-weight: 700; color: var(--ink-strong); }
    .editor em { font-style: italic; }
    .editor img { max-width: 100%; height: auto; margin: 8px 0; }

    .body-readonly {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      padding: 28px 32px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--ink);
      min-height: 80px;
    }
    .body-readonly h1 { font-size: 26px; font-weight: 700; margin: 22px 0 12px; line-height: 1.2; color: var(--ink-strong); }
    .body-readonly h1:first-child { margin-top: 0; }
    .body-readonly h2 { font-size: 20px; font-weight: 700; margin: 20px 0 10px; line-height: 1.3; color: var(--ink-strong); }
    .body-readonly h3 { font-size: 16px; font-weight: 700; margin: 16px 0 6px; color: var(--ink-strong); }
    .body-readonly p { margin: 0 0 12px; }
    .body-readonly ul, .body-readonly ol { padding-left: 24px; margin: 0 0 14px; }
    .body-readonly li { margin-bottom: 5px; }
    .body-readonly blockquote {
      margin: 16px 0;
      padding: 14px 18px;
      border-left: 3px solid var(--amber);
      background: var(--amber-bg);
      font-size: 14px;
    }
    .body-readonly a { color: var(--amber); border-bottom: 1px solid rgba(44,79,224,0.3); text-decoration: none; }
    .body-readonly a:hover { border-bottom-color: var(--amber); }
    .body-readonly img { max-width: 100%; height: auto; margin: 10px 0; }
    .body-readonly:empty { display: none; }

    /* Media gallery in detail */
    .detail-media { margin-top: 36px; }
    .detail-media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .detail-media-item {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      cursor: pointer;
      transition: border-color .15s;
      overflow: hidden;
    }
    .detail-media-item:hover { border-color: var(--amber); }
    .detail-media-thumb {
      aspect-ratio: 16 / 10;
      background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--muted-2);
      overflow: hidden;
    }
    .detail-media-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-media-info {
      padding: 10px 12px;
      font-size: 12px; color: var(--ink);
    }
    .detail-media-info .type {
      font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--amber); font-weight: 600; margin-bottom: 3px;
    }
    .detail-media-info .name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Third-tier sidebar in section view */
    .section-with-tier {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
    }
    .tier-side {
      padding: 18px 18px 28px;
      border-right: 1px solid var(--line-soft);
      min-height: 400px;
    }
    .tier-side-label {
      font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line-soft);
    }
    .tier-side-list {
      display: flex; flex-direction: column; gap: 2px;
    }
    .tier-side-item {
      text-align: left;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      color: var(--ink);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .12s;
      display: flex; justify-content: space-between; align-items: center;
      font-family: inherit;
    }
    .tier-side-item:hover { background: var(--bg-soft); }
    .tier-side-item.active {
      background: var(--amber-bg);
      border-left-color: var(--amber);
      color: var(--amber);
      font-weight: 600;
    }
    .tier-side-item .num { font-size: 11px; color: var(--muted); }
    .tier-side-item.active .num { color: var(--amber); opacity: .8; }
    .tier-side-add {
      margin-top: 8px;
      padding: 6px 12px;
      background: transparent;
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .tier-side-add:hover { color: var(--ink); border-color: var(--ink); }

    @media (max-width: 820px) {
      .section-with-tier { grid-template-columns: 1fr; }
      .tier-side {
        border-right: none;
        border-bottom: 1px solid var(--line-soft);
        min-height: 0;
        padding: 14px 24px;
      }
      .tier-side-list { flex-direction: row; flex-wrap: wrap; gap: 6px; }
      .tier-side-item { border-left: none; border-bottom: 2px solid transparent; padding: 6px 10px; background: var(--bg-paper); border: 1px solid var(--line); }
      .tier-side-item.active { border: 1px solid var(--amber); border-left: 1px solid var(--amber); }
      .detail-body { padding: 24px 20px 60px; }
      .detail-title { font-size: 28px; }
      .detail-title-input { font-size: 28px; }
      .props-row { grid-template-columns: 100px 1fr; }
    }

    /* ============ Sync indicator ============ */
    #sync {
      position: fixed; bottom: 20px; left: 300px;
      background: var(--ink); color: var(--cream);
      padding: 8px 16px;
      font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
      opacity: 0; transition: opacity .3s;
      z-index: 8000;
      border-left: 2px solid var(--amber);
    }
    #sync.show { opacity: 1; }

    /* ============ Mobile ============ */
    .mobile-toggle {
      display: none;
      position: fixed; top: 16px; left: 16px;
      width: 40px; height: 40px;
      background: var(--ink); color: var(--cream);
      border: none;
      z-index: 7500;
      align-items: center; justify-content: center;
    }
    .mobile-toggle svg { width: 18px; height: 18px; }

    @media (max-width: 1024px) {
      .modal-body { grid-template-columns: 1fr; }
      .modal-info { border-left: none; border-top: 1px solid var(--ink-line); }
    }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        width: 280px; z-index: 7000;
        transform: translateX(-100%);
        transition: transform .25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-toggle { display: flex; }
      .main-header { padding: 80px 24px 20px; flex-direction: column; align-items: flex-start; }
      .header-title { font-size: 32px; }
      .subcat-bar { padding: 14px 24px; }
      .grid-wrap { padding: 24px; }
      .form-foot { flex-direction: column-reverse; align-items: stretch; }
      .form-foot .left, .form-foot .right { justify-content: stretch; }
      .form-foot button { flex: 1; }
      #sync { left: 16px; }
    }

    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.5);
      z-index: 6900;
    }
    .sidebar-overlay.open { display: block; }

    /* ============ Toast / Confirm ============ */
    .confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(14,21,37,0.7);
      z-index: 9700;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .confirm-box {
      background: var(--paper);
      max-width: 380px; width: calc(100% - 40px);
      padding: 32px 32px 24px;
      border: 1px solid var(--ink-line);
    }
    .confirm-title {
      font-family: var(--serif);
      font-size: 22px; color: var(--ink);
      margin-bottom: 8px;
    }
    .confirm-text {
      font-size: 13px; color: var(--muted); line-height: 1.6;
      margin-bottom: 20px;
    }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* selection */
    ::selection { background: var(--amber); color: var(--ink); }


    /* ═══════════════════════════════════════════════════════
       PREMIUM REDESIGN LAYER v2 — clean · refined · editorial
       (마지막에 선언되어 기존 규칙을 덮어씀)
       ═══════════════════════════════════════════════════════ */

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: var(--bg-paper);
      border-right: 1px solid var(--line-soft);
      padding: 32px 0 24px;
    }
    .brand { padding: 0 26px 26px; border-bottom: 1px solid var(--line-soft); margin-bottom: 26px; }
    .brand-mark { font-size: 24px; font-style: normal; font-weight: 600; letter-spacing: -.01em; }
    .brand-mark em { font-style: italic; font-weight: 500; }
    .brand-sub { letter-spacing: .32em; color: var(--muted-2); margin-top: 10px; }
    .search-box { margin: 0 18px 26px; }
    .search-box input {
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid transparent;
      padding: 11px 14px 11px 36px;
    }
    .search-box input:focus { border-color: var(--ink-strong); background: var(--bg-paper); }
    .search-icon { left: 14px; }
    .nav-label { color: var(--muted-2); letter-spacing: .32em; padding: 0 26px; margin-bottom: 8px; }
    .nav-list { margin-bottom: 26px; padding: 0 12px; }
    .nav-item {
      border-left: none;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 1px;
      font-size: 14px;
    }
    .nav-item:hover { background: var(--bg); }
    .nav-item.active {
      background: var(--ink-strong);
      color: #F5F4EF;
      border-left: none;
    }
    .nav-item.active .nav-count { color: rgba(245,244,239,0.6); opacity: 1; }
    .nav-item.nav-sub { padding-left: 28px; }
    .nav-item.nav-sub.active,
    .nav-item.nav-subsub.active {
      background: var(--ink-strong);
      color: #F5F4EF;
      border-left: none; opacity: 1;
    }
    .nav-item.nav-subsub { padding-left: 42px; }
    .sidebar-footer { padding: 18px 26px 0; border-top: 1px solid var(--line-soft); }

    /* ---------- 섹션 헤더 ---------- */
    .header-title {
      font-family: var(--serif);
      font-weight: 600; letter-spacing: -.02em;
      word-break: keep-all;
    }
    .header-eyebrow { color: var(--muted); letter-spacing: .28em; }
    .header-meta { color: var(--muted); }

    /* ---------- 게시판 칩 바 ---------- */
    .board-chip {
      padding: 9px 18px;
      font-size: 13px; font-weight: 600;
      background: var(--bg-paper);
      border: 1px solid var(--line-soft);
      box-shadow: 0 1px 3px rgba(11,12,16,0.04);
      transition: all .18s;
    }
    .board-chip:hover { border-color: var(--ink-strong); }
    .board-chip.active {
      background: var(--ink-strong);
      border-color: var(--ink-strong);
      color: #F5F4EF;
    }
    .board-chip.dashed {
      background: transparent; box-shadow: none;
      border: 1px dashed var(--line-strong);
    }
    .subcat-chip {
      background: var(--bg-paper);
      border: 1px solid var(--line-soft);
      box-shadow: 0 1px 3px rgba(11,12,16,0.04);
    }
    .subcat-chip.active { background: var(--ink-strong); border-color: var(--ink-strong); }

    /* ---------- 분류 인덱스 (랜딩) 변형 ---------- */
    .subcat-landing { padding: 8px 56px 90px; }
    .index-row.sub { grid-template-columns: 60px 300px 1fr 72px; padding: 26px 12px; }
    .index-row.sub .ir-title { font-size: 23px; }
    .index-row.add { cursor: pointer; }
    .index-row.add:hover { background: var(--bg-soft); padding-left: 26px; }
    .index-row.add:hover .ir-title { color: var(--ink) !important; }
    .ir-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .ir-actions button {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg-paper);
      border: 1px solid var(--line);
      color: var(--muted); font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    .ir-actions button:hover { border-color: var(--ink-strong); color: var(--ink-strong); }
    .index-row:hover .ir-actions button {
      background: transparent; border-color: rgba(245,244,239,0.4); color: #F5F4EF;
    }
    @media (max-width: 900px) {
      .index-row.sub { grid-template-columns: 40px 1fr 60px; }
      .subcat-landing { padding: 8px 24px 60px; }
    }

    /* ---------- Home / Hero (Awwwards style) ---------- */
    .home::before { content: none; }
    .home-inner { padding: 36px 60px 120px; max-width: 1280px; margin: 0 auto; }
    .home-topbar {
      margin-bottom: 70px;
      font-size: 10px; letter-spacing: .26em;
      color: var(--muted-2);
      border-bottom: none;
      padding-bottom: 0;
    }
    .home-hero { margin: 0 auto 64px; max-width: 100%; text-align: center; }
    .home-eyebrow {
      display: inline-flex; align-items: center;
      justify-content: center;
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      color: var(--muted);
      background: var(--bg-paper);
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      padding: 7px 16px;
      margin-bottom: 30px;
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(11,12,16,0.05);
    }
    .home-eyebrow::before { content: none; }
    .home-title {
      font-family: var(--sans);
      font-size: clamp(52px, 7.2vw, 96px);
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -.045em;
      color: var(--ink-strong);
      word-break: keep-all;
      margin-bottom: 24px;
    }
    .home-title em { font-style: normal; color: var(--ink-strong); opacity: .32; }
    .home-tagline {
      font-size: 15px; color: var(--muted);
      max-width: 460px; margin: 0 auto;
      line-height: 1.7;
      opacity: 1;
    }

    /* ---------- 다크 카테고리 카드 ---------- */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 72px;
    }
    .cat-card {
      background: #101114;
      border-radius: 12px;
      padding: 26px 26px 22px;
      min-height: 300px;
      display: flex; flex-direction: column;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      position: relative;
      overflow: hidden;
    }
    .cat-card:hover { transform: translateY(-5px); box-shadow: 0 20px 44px rgba(11,12,16,0.22); }
    .cat-thumb {
      height: 108px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 26px;
    }
    .cat-thumb img {
      max-height: 104px; max-width: 78%;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    }
    .cat-thumb-num {
      font-size: 52px; font-weight: 800; letter-spacing: -.04em;
      color: rgba(245,244,239,0.10);
    }
    .cat-label {
      font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase;
      color: #8FA8E8;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .cat-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }
    .cat-name {
      font-size: 26px; font-weight: 800; letter-spacing: -.025em;
      line-height: 1.16;
      color: #FAFAF8;
      word-break: keep-all;
    }
    .cat-badge {
      flex: none;
      border: 1px solid rgba(250,250,248,0.22);
      border-radius: 8px;
      padding: 7px 12px 8px;
      text-align: center;
      line-height: 1.15;
    }
    .cat-badge span {
      display: block;
      font-size: 8.5px; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(250,250,248,0.55);
      margin-bottom: 2px;
    }
    .cat-badge b {
      font-size: 16px; font-weight: 700;
      color: #FAFAF8;
      font-variant-numeric: tabular-nums;
    }
    .cat-foot {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(250,250,248,0.10);
      display: flex; justify-content: space-between; gap: 10px;
      font-size: 10.5px;
      color: rgba(250,250,248,0.5);
      letter-spacing: .02em;
    }
    @media (max-width: 1100px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 620px)  { .cat-grid { grid-template-columns: 1fr; } .cat-card { min-height: 240px; } }

    /* ---------- 디렉토리 테이블 (즐겨찾기 / 최근 자료) ---------- */
    .dir-wrap { margin-top: 8px; }
    .dir-head, .dir-row {
      display: grid;
      grid-template-columns: minmax(240px, 1.6fr) .7fr .8fr .7fr 88px;
      align-items: center;
      gap: 16px;
      padding: 0 10px;
    }
    .dir-head {
      padding-top: 6px; padding-bottom: 14px;
    }
    .dir-head .dh {
      font-size: 9.5px; letter-spacing: .16em; text-transform: uppercase;
      color: var(--amber);
      font-weight: 600;
    }
    .dir-row {
      padding-top: 20px; padding-bottom: 20px;
      border-top: 1px solid var(--line-soft);
      cursor: pointer;
      transition: background .18s;
    }
    .dir-row:last-of-type { border-bottom: 1px solid var(--line-soft); }
    .dir-row:hover { background: var(--bg-paper); }
    .dir-row .dc { font-size: 13px; color: var(--muted); }
    .dir-row .dc.name {
      display: flex; align-items: center; gap: 12px;
      min-width: 0;
    }
    .dir-row .dc.name b {
      font-size: 13.5px; font-weight: 700; color: var(--ink-strong);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }
    .dir-row:hover .dc.name b { border-bottom-color: var(--ink-strong); }
    .dir-pro {
      font-style: normal; font-size: 10px; color: var(--amber);
      flex: none;
    }
    .dir-ava {
      flex: none;
      width: 34px; height: 34px; border-radius: 50%;
      background: #101114;
      color: #FAFAF8;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      overflow: hidden;
    }
    .dir-ava img { width: 100%; height: 100%; object-fit: cover; }
    .dir-row .dc.view { text-align: right; }
    .dir-row .dc.view button {
      background: var(--bg-paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 12px; font-weight: 600;
      color: var(--ink);
      transition: all .18s;
    }
    .dir-row .dc.view button:hover { background: var(--ink-strong); border-color: var(--ink-strong); color: #FAFAF8; }
    .dir-foot {
      text-align: center;
      padding: 26px 0 0;
      font-size: 12px; color: var(--muted);
    }
    .dir-foot b { color: var(--ink-strong); }
    @media (max-width: 900px) {
      .dir-head, .dir-row { grid-template-columns: 1fr auto 72px; }
      .dir-head .dh:nth-child(2), .dir-head .dh:nth-child(3),
      .dir-row .dc:nth-child(2), .dir-row .dc:nth-child(3) { display: none; }
      .home-inner { padding: 28px 22px 80px; }
    }

    /* ---------- 인덱스 리스트 (분류 랜딩에서 사용) ---------- */
    .index-list { margin-top: 20px; }
    .index-row {
      display: grid;
      grid-template-columns: 72px 220px 1fr auto 48px;
      align-items: center;
      gap: 20px;
      padding: 28px 12px;
      border-top: 1px solid var(--line);
      cursor: pointer;
      position: relative;
      transition: background .22s, padding .22s;
    }
    .index-row:last-child { border-bottom: 1px solid var(--line); }
    .index-row .ir-num {
      font-size: 13px; font-weight: 600;
      color: var(--muted-2);
      letter-spacing: .04em;
      transition: color .22s;
    }
    .index-row .ir-title {
      font-family: var(--sans);
      font-size: 24px; font-weight: 800; letter-spacing: -.03em;
      color: var(--ink-strong);
      transition: color .22s;
      word-break: keep-all;
    }
    .index-row .ir-desc {
      font-size: 13px; color: var(--muted);
      transition: color .22s;
    }
    .index-row .ir-count {
      font-size: 19px; font-weight: 700; letter-spacing: -.01em;
      color: var(--ink-strong);
      font-variant-numeric: tabular-nums;
      transition: color .22s;
      text-align: right;
    }
    .index-row .ir-count i {
      font-style: normal; font-size: 11px; font-weight: 500;
      color: var(--muted-2); margin-left: 3px;
      transition: color .22s;
    }
    .index-row .ir-arrow {
      font-size: 18px; color: var(--muted-2);
      text-align: right;
      transition: transform .22s, color .22s;
    }
    .index-row:hover { background: var(--ink-strong); padding-left: 26px; border-radius: 12px; }
    .index-row:hover + .index-row { border-top-color: transparent; }
    .index-row:hover .ir-title,
    .index-row:hover .ir-count { color: #F5F4EF; }
    .index-row:hover .ir-num,
    .index-row:hover .ir-desc,
    .index-row:hover .ir-count i { color: rgba(245,244,239,0.55); }
    .index-row:hover .ir-arrow { color: #F5F4EF; transform: translateX(6px); }
    @media (max-width: 900px) {
      .index-row { grid-template-columns: 44px 1fr auto 32px; }
      .index-row .ir-desc { display: none; }

function getYouTubeId(url) {

function isImageFile(name) { return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(name||''); }

function isPdfFile(name) { return /\.pdf$/i.test(name||''); }
function fmtDate(ts) {

function pickThumb(item) {
  // priority: explicit thumb > first image file > youtube thumb > link preview image
  if (item.thumbUrl) return item.thumbUrl;
  const files = item.files || [];
  const img = files.find(f => isImageFile(f.name));
  if (img && img.directUrl) return img.directUrl;
  const yt = getYouTubeThumb(item.videoUrl) || getYouTubeThumb(item.linkUrl);
  if (yt) return yt;
  if (item.linkImage) return item.linkImage;

  return null;
}
function getDomain(url) {

/* 제목 해시 → 딥 잉크 그라디언트 (플레이스홀더 타일용, 밝은 텍스트와 고대비) */
const PH_GRADIENTS = [
  'linear-gradient(135deg,#16171E,#2A2C3A)',
  'linear-gradient(135deg,#1A1B22,#33343E)',
  'linear-gradient(135deg,#14181F,#26313C)',

function phGradient(seed) {
  let h = 0;
  const s = String(seed || '');
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return PH_GRADIENTS[Math.abs(h) % PH_GRADIENTS.length];
}
